<!doctype html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/dashboard :: layout(
        'Khóa phòng',
        'Danh sách khóa phòng',
        'Quản lý khóa phòng (room_block_times)',
        'room-block-times',
        ~{::content}
      )}">
<body>
<div th:fragment="content">

    <div th:if="${success}" class="alert alert-success">
        <i class="fa-solid fa-circle-check me-1"></i>
        <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger">
        <i class="fa-solid fa-triangle-exclamation me-1"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="d-flex justify-content-between mb-3">
                <form class="d-flex gap-2" method="get" th:action="@{/admin/room-block-times}">
                    <input class="form-control"
                           name="keyword"
                           placeholder="Tìm theo phòng, lý do, loại khóa, trạng thái..."
                           th:value="${keyword}">
                    <input type="hidden" name="size" th:value="${size}">
                    <button class="btn btn-outline-primary">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        Tìm
                    </button>
                </form>
                <div class="d-flex gap-2">
                    <a class="btn btn-outline-success" th:href="@{/admin/room-block-times/export}">
                        <i class="fa-solid fa-file-excel"></i>
                        Export
                    </a>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/room-block-times/print}" target="_blank">
                        <i class="fa-solid fa-print"></i>
                        In
                    </a>
                    <a class="btn btn-primary" th:href="@{/admin/room-block-times/new}">
                        <i class="fa-solid fa-plus"></i>
                        Thêm mới
                    </a>
                </div>
            </div>

            <form method="post" enctype="multipart/form-data" th:action="@{/admin/room-block-times/import}"
                  class="mb-3 d-flex gap-2">
                <input type="file" name="file" class="form-control" accept=".xlsx,.xls" required>
                <button class="btn btn-outline-primary">
                    <i class="fa-solid fa-upload"></i>
                    Import
                </button>
            </form>

            <table class="table table-hover">
                <thead>
                <tr>
                    <th>Phòng</th>
                    <th>Loại khóa</th>
                    <th class="text-center">Thứ</th>
                    <th>Khung giờ</th>
                    <th class="text-center">Tuần</th>
                    <th>Từ ngày - Đến ngày</th>
                    <th>Lý do</th>
                    <th class="text-center">Trạng thái</th>
                    <th class="text-end">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="b : ${items.content}">
                    <td>
                        <span th:text="${b.roomCode}"></span>
                        <span class="text-muted small" th:if="${b.roomName}" th:text="' - ' + ${b.roomName}"></span>
                    </td>
                    <td>
                        <span class="badge text-bg-secondary" th:text="${b.blockType}"></span>
                    </td>
                    <td class="text-center" th:text="${b.dayOfWeek} ?: '-'"></td>
                    <td th:text="${b.timeSlotCode} ?: '-'"></td>
                    <td class="text-center">
                        <span th:if="${b.startWeek != null or b.endWeek != null}"
                              th:text="${(b.startWeek != null ? b.startWeek : '') + '-' + (b.endWeek != null ? b.endWeek : '')}">-</span>
                        <span th:if="${b.startWeek == null and b.endWeek == null}">-</span>
                    </td>
                    <td>
                        <span th:if="${b.startDate != null}" th:text="${#temporals.format(b.startDate, 'dd/MM/yyyy')}"></span>
                        <span th:if="${b.startDate != null and b.endDate != null}"> → </span>
                        <span th:if="${b.endDate != null}" th:text="${#temporals.format(b.endDate, 'dd/MM/yyyy')}"></span>
                        <span th:if="${b.startDate == null and b.endDate == null}">-</span>
                    </td>
                    <td th:text="${b.reason} ?: '-'"></td>
                    <td class="text-center">
                        <span class="badge text-bg-success" th:if="${b.status.name() == 'ACTIVE'}">ACTIVE</span>
                        <span class="badge text-bg-secondary" th:if="${b.status.name() == 'CANCELLED'}">CANCELLED</span>
                    </td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/room-block-times/{id}/edit(id=${b.blockId})}">
                            <i class="fa-solid fa-pen-to-square"></i>
                            Sửa
                        </a>
                        <form method="post" th:action="@{/admin/room-block-times/{id}/delete(id=${b.blockId})}"
                              style="display:inline;" onsubmit="return confirm('Bạn có chắc chắn muốn xóa bản ghi khóa phòng này?');">
                            <button class="btn btn-sm btn-outline-danger">
                                <i class="fa-solid fa-trash"></i>
                                Xóa
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${items.content.isEmpty()}">
                    <td colspan="9" class="text-center text-muted">
                        <i class="fa-solid fa-box-open"></i>
                        Không có dữ liệu khóa phòng
                    </td>
                </tr>
                </tbody>
            </table>

            <nav th:if="${items.totalPages > 1}">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${items.first} ? ' disabled'">
                        <a class="page-link" th:href="@{/admin/room-block-times(page=${items.number - 1}, size=${size}, keyword=${keyword})}">Trước</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, items.totalPages - 1)}"
                        th:classappend="${i == items.number} ? ' active'">
                        <a class="page-link" th:text="${i + 1}"
                           th:href="@{/admin/room-block-times(page=${i}, size=${size}, keyword=${keyword})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${items.last} ? ' disabled'">
                        <a class="page-link" th:href="@{/admin/room-block-times(page=${items.number + 1}, size=${size}, keyword=${keyword})}">Sau</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
</body>
</html>
