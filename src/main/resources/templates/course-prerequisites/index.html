<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/dashboard :: layout(
        'Học phần tiên quyết',
        'Danh sách học phần tiên quyết',
        'Quản lý quan hệ học phần tiên quyết',
        'course-prerequisites',
        ~{::content}
      )}">
<body>
<div th:fragment="content">

    <div th:if="${success}" class="alert alert-success shadow-sm" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger shadow-sm" th:text="${error}"></div>

    <div class="card border-0 shadow-sm hover-card">
        <div class="card-body">

            <div class="d-flex flex-wrap gap-2 justify-content-between mb-3">

                <form class="d-flex gap-2" method="get" th:action="@{/admin/course-prerequisites}">
                    <input class="form-control"
                           style="min-width:260px"
                           type="text"
                           name="keyword"
                           placeholder="Tìm theo mã/tên học phần hoặc học phần tiên quyết..."
                           th:value="${keyword}">
                    <button class="btn btn-outline-primary" type="submit">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>

                <div class="d-flex flex-wrap gap-2">
                    <a class="btn btn-primary"
                       th:href="@{/admin/course-prerequisites/new}">
                        <i class="fa-solid fa-plus me-1"></i> Thêm mới
                    </a>
                    <a class="btn btn-outline-secondary"
                       th:href="@{/api/course-prerequisites/export}">
                        <i class="fa-solid fa-file-excel me-1"></i> Export Excel
                    </a>
                    <a class="btn btn-outline-success"
                       th:href="@{/admin/course-prerequisites/print}" target="_blank">
                        <i class="fa-solid fa-print me-1"></i> Print
                    </a>
                </div>
            </div>


            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Học phần</th>
                        <th>Học phần tiên quyết</th>
                        <th class="text-end">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${relations == null or relations.content == null or relations.content.isEmpty()}">
                        <td colspan="4" class="text-center text-muted">Không có dữ liệu</td>
                    </tr>

                    <tr th:if="${relations != null and relations.content != null}"
                        th:each="r, idx : ${relations.content}">
                        <td th:text="${idx.index + 1 + relations.number * relations.size}"></td>
                        <td>
                            <strong th:text="${r.courseCode}"></strong>
                            <div class="text-muted small" th:text="${r.courseName}"></div>
                        </td>
                        <td>
                            <strong th:text="${r.prerequisiteCourseCode}"></strong>
                            <div class="text-muted small" th:text="${r.prerequisiteCourseName}"></div>
                        </td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-primary me-1"
                               th:href="@{/admin/course-prerequisites/{id}/edit(id=${r.id})}">
                                <i class="fa-solid fa-pen"></i>
                            </a>
                            <form class="d-inline"
                                  th:action="@{/api/course-prerequisites/{id}(id=${r.id})}"
                                  method="post"
                                  onsubmit="return confirm('Bạn có chắc muốn xoá quan hệ này?')">
                                <input type="hidden" name="_method" value="delete"/>
                                <button class="btn btn-sm btn-outline-danger" type="submit">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${relations != null and relations.totalPages > 1}">
                <ul class="pagination">
                    <li class="page-item" th:classappend="${relations.first} ? 'disabled' : ''">
                        <a class="page-link"
                           th:href="@{/admin/course-prerequisites(page=${relations.first ? 0 : relations.number - 1}, keyword=${keyword})}">
                            Trước
                        </a>
                    </li>
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, relations.totalPages - 1)}"
                        th:classappend="${i == relations.number} ? 'active' : ''">
                        <a class="page-link"
                           th:text="${i + 1}"
                           th:href="@{/admin/course-prerequisites(page=${i}, keyword=${keyword})}">
                        </a>
                    </li>
                    <li class="page-item" th:classappend="${relations.last} ? 'disabled' : ''">
                        <a class="page-link"
                           th:href="@{/admin/course-prerequisites(page=${relations.last ? relations.totalPages - 1 : relations.number + 1}, keyword=${keyword})}">
                            Sau
                        </a>
                    </li>
                </ul>
            </nav>

        </div>
    </div>

</div>
</body>
</html>
