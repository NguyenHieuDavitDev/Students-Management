<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>In danh sách học phần tiên quyết</title>
    <style>
        body { font-family: Arial; }
        table { width:100%; border-collapse: collapse; margin-top:20px; }
        th, td { border:1px solid #000; padding:6px; }
        th { background:#f2f2f2; }
        h3 { text-align:center; }
    </style>
</head>
<body onload="window.print()">

<h3>DANH SÁCH HỌC PHẦN TIÊN QUYẾT</h3>

<table>
    <thead>
    <tr>
        <th>STT</th>
        <th>Mã học phần</th>
        <th>Tên học phần</th>
        <th>Mã HP tiên quyết</th>
        <th>Tên HP tiên quyết</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${relations == null}">
        <td colspan="5" class="text-center">Không có dữ liệu</td>
    </tr>
    <tr th:each="r, i : ${relations}">
        <td th:text="${i.index + 1}"></td>
        <td th:text="${r.courseCode}"></td>
        <td th:text="${r.courseName}"></td>
        <td th:text="${r.prerequisiteCourseCode}"></td>
        <td th:text="${r.prerequisiteCourseName}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
