<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/dashboard :: layout(
        (${mode}=='edit'?'Chỉnh sửa phòng học':'Thêm phòng học'),
        (${mode}=='edit'?'Chỉnh sửa phòng học':'Thêm phòng học'),
        'Form phòng học',
        'rooms',
        ~{::content}
      )}">
<body>
<div th:fragment="content">

    <div class="alert alert-danger"
         th:if="${globalError}"
         th:text="${globalError}"></div>

    <form method="post"
          th:action="${mode}=='edit'
        ? @{/admin/rooms/{id}(id=${roomId})}
        : @{/admin/rooms}"
          th:object="${roomRequest}">

        <div class="row g-3">
            <div class="col-md-6">
                <label>Mã phòng <span class="text-danger">*</span></label>
                <input class="form-control" th:field="*{roomCode}">
                <small class="text-danger" th:errors="*{roomCode}"></small>
            </div>

            <div class="col-md-6">
                <label>Tên phòng <span class="text-danger">*</span></label>
                <input class="form-control" th:field="*{roomName}">
                <small class="text-danger" th:errors="*{roomName}"></small>
            </div>

            <div class="col-md-6">
                <label>Tòa nhà <span class="text-danger">*</span></label>
                <select class="form-select" th:field="*{buildingId}">
                    <option value="">-- Chọn tòa nhà --</option>
                    <option th:each="b : ${buildings}"
                            th:value="${b.buildingId}"
                            th:text="${b.buildingName}">
                    </option>
                </select>
                <small class="text-danger" th:errors="*{buildingId}"></small>
            </div>

            <div class="col-md-6">
                <label>Loại phòng <span class="text-danger">*</span></label>
                <select class="form-select" th:field="*{roomTypeId}">
                    <option value="">-- Chọn loại phòng --</option>
                    <option th:each="rt : ${roomTypes}"
                            th:value="${rt.roomTypeId}"
                            th:text="${rt.roomTypeName}">
                    </option>
                </select>
                <small class="text-danger" th:errors="*{roomTypeId}"></small>
            </div>

            <div class="col-md-4">
                <label>Tầng</label>
                <input type="number" class="form-control" th:field="*{floor}">
                <small class="text-danger" th:errors="*{floor}"></small>
            </div>

            <div class="col-md-4">
                <label>Sức chứa</label>
                <input type="number" class="form-control" th:field="*{capacity}">
                <small class="text-danger" th:errors="*{capacity}"></small>
            </div>

            <div class="col-md-4">
                <label>Diện tích (m²)</label>
                <input type="number" step="0.01" class="form-control" th:field="*{area}">
                <small class="text-danger" th:errors="*{area}"></small>
            </div>

            <div class="col-md-6">
                <label>Trạng thái <span class="text-danger">*</span></label>
                <select class="form-select" th:field="*{status}">
                    <option th:each="s : ${statuses}"
                            th:value="${s}"
                            th:text="${s}">
                    </option>
                </select>
                <small class="text-danger" th:errors="*{status}"></small>
            </div>

            <div class="col-md-6">
                <label>Hoạt động <span class="text-danger">*</span></label>
                <select class="form-select" th:field="*{isActive}">
                    <option th:value="true">Đang hoạt động</option>
                    <option th:value="false">Ngừng hoạt động</option>
                </select>
                <small class="text-danger" th:errors="*{isActive}"></small>
            </div>
        </div>

        <div class="mt-3">
            <button class="btn btn-primary">Lưu</button>
            <a class="btn btn-secondary" th:href="@{/admin/rooms}">Huỷ</a>
        </div>

    </form>

</div>
</body>
</html>
