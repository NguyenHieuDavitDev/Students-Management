<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>In danh sách phòng học</title>

    <style>
        @page { size: A4; margin: 20mm; }
        body { font-family: "Segoe UI", Arial, sans-serif; font-size: 13px; color: #000; }
        .header { text-align: center; margin-bottom: 16px; }
        .header h2 { margin: 0; font-size: 20px; text-transform: uppercase; }
        .header .sub { font-size: 12px; margin-top: 4px; }
        .info { margin-bottom: 10px; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #000; padding: 6px 8px; }
        th { background: #f2f2f2; text-align: center; font-weight: 600; }
        td { vertical-align: middle; }
        .text-center { text-align: center; }
        .footer { margin-top: 20px; display: flex; justify-content: space-between; font-size: 12px; }
        .signature { text-align: center; width: 200px; }
        .signature p { margin: 0; }
    </style>
</head>

<body onload="window.print()">

<div class="header">
    <h2>DANH SÁCH PHÒNG HỌC</h2>
    <div class="sub">
        Ngày in:
        <span th:text="${#dates.format(#dates.createNow(), 'dd/MM/yyyy')}"></span>
    </div>
</div>

<div class="info">
    Tổng số phòng:
    <strong th:text="${rooms.size()}"></strong>
</div>

<table>
    <thead>
    <tr>
        <th style="width:40px">STT</th>
        <th style="width:90px">Mã</th>
        <th>Tên phòng</th>
        <th style="width:140px">Tòa nhà</th>
        <th style="width:140px">Loại phòng</th>
        <th style="width:60px">Tầng</th>
        <th style="width:80px">Sức chứa</th>
        <th style="width:90px">Trạng thái</th>
        <th style="width:70px">Active</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="r, i : ${rooms}">
        <td class="text-center" th:text="${i.index + 1}"></td>
        <td th:text="${r.roomCode}"></td>
        <td th:text="${r.roomName}"></td>
        <td th:text="${r.buildingName}"></td>
        <td th:text="${r.roomTypeName}"></td>
        <td class="text-center" th:text="${r.floor}"></td>
        <td class="text-center" th:text="${r.capacity}"></td>
        <td class="text-center" th:text="${r.status}"></td>
        <td class="text-center" th:text="${r.isActive}"></td>
    </tr>

    <tr th:if="${rooms.isEmpty()}">
        <td colspan="9" class="text-center">
            Không có dữ liệu phòng học
        </td>
    </tr>
    </tbody>
</table>

<div class="footer">
    <div></div>
    <div class="signature">
        <p><strong>Người lập danh sách</strong></p>
        <p style="margin-top: 40px;">(Ký, ghi rõ họ tên)</p>
    </div>
</div>

</body>
</html>
