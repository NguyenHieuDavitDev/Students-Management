<!doctype html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/dashboard :: layout(
        'Tài liệu học tập',
        'Danh sách tài liệu',
        'Quản lý tài liệu học tập',
        'documents',
        ~{::content}
      )}">
<body>
<div th:fragment="content">

    <div th:if="${success}" class="alert alert-success">
        <i class="fa-solid fa-circle-check me-1"></i>
        <span th:text="${success}"></span>
    </div>

    <div th:if="${error}" class="alert alert-danger">
        <i class="fa-solid fa-triangle-exclamation me-1"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card">
        <div class="card-body">

            <div class="d-flex flex-wrap justify-content-between gap-2 mb-3">

                <form class="d-flex gap-2 flex-grow-1" style="min-width: 240px;" method="get" th:action="@{/admin/documents}">
                    <input class="form-control"
                           name="keyword"
                           placeholder="Tìm theo tiêu đề, mô tả, loại file hoặc URL"
                           th:value="${keyword}">
                    <input type="hidden" name="size" th:value="${size}">
                    <button class="btn btn-outline-primary">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        Tìm
                    </button>
                </form>

                <div class="d-flex flex-wrap gap-2">
                    <a class="btn btn-outline-success" th:href="@{/admin/documents/export}">
                        <i class="fa-solid fa-file-excel"></i>
                        Export
                    </a>
                    <a class="btn btn-outline-secondary"
                       th:href="@{/admin/documents/print}"
                       target="_blank">
                        <i class="fa-solid fa-print"></i>
                        In
                    </a>
                    <a class="btn btn-primary" th:href="@{/admin/documents/new}">
                        <i class="fa-solid fa-plus"></i>
                        Thêm mới
                    </a>
                </div>
            </div>

            <form method="post"
                  enctype="multipart/form-data"
                  th:action="@{/admin/documents/import}"
                  class="mb-3 d-flex flex-wrap gap-2 align-items-center">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="file"
                       name="file"
                       class="form-control"
                       style="max-width: 420px;"
                       accept=".xlsx,.xls"
                       required>
                <button class="btn btn-outline-primary">
                    <i class="fa-solid fa-upload"></i>
                    Import Excel
                </button>
            </form>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                    <tr>
                        <th>Tiêu đề</th>
                        <th>Môn học</th>
                        <th>Loại file</th>
                        <th>Người tải</th>
                        <th>Ngày tải</th>
                        <th class="text-end">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="d : ${documents.content}">
                        <td>
                            <div class="fw-semibold" th:text="${d.title}"></div>
                            <a th:if="${d.fileUrl != null}"
                               th:href="${d.fileUrl}"
                               target="_blank"
                               rel="noopener noreferrer"
                               class="small text-truncate d-inline-block"
                               style="max-width: 280px;"
                               th:text="${d.fileUrl}"></a>
                        </td>
                        <td>
                            <span th:text="${d.subjectCourseCode}">—</span>
                            <span class="text-muted small" th:if="${d.subjectCourseName != null}"
                                  th:text="${' — ' + d.subjectCourseName}"></span>
                        </td>
                        <td th:text="${d.fileType != null ? d.fileType : '—'}"></td>
                        <td>
                            <span th:text="${d.uploadedByUsername}">—</span>
                        </td>
                        <td class="text-nowrap small" th:text="${d.createdAt != null ? #temporals.format(d.createdAt, 'dd/MM/yyyy HH:mm') : '—'}"></td>
                        <td class="text-end text-nowrap">
                            <a class="btn btn-sm btn-outline-primary"
                               th:href="@{/admin/documents/{id}/edit(id=${d.documentId})}">
                                <i class="fa-solid fa-pen-to-square"></i>
                                Sửa
                            </a>
                            <form method="post"
                                  th:action="@{/admin/documents/{id}/delete(id=${d.documentId})}"
                                  class="d-inline"
                                  onsubmit="return confirm('Xóa tài liệu này?');">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="fa-solid fa-trash"></i>
                                    Xóa
                                </button>
                            </form>
                        </td>
                    </tr>

                    <tr th:if="${documents.content.isEmpty()}">
                        <td colspan="6" class="text-center text-muted py-4">
                            <i class="fa-solid fa-file-lines"></i>
                            Chưa có tài liệu nào
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${documents.totalPages > 1}">
                <ul class="pagination justify-content-center mb-0">
                    <li class="page-item" th:classappend="${documents.first} ? ' disabled'">
                        <a class="page-link"
                           th:href="@{/admin/documents(page=${documents.number - 1}, size=${size}, keyword=${keyword})}">
                            Trước
                        </a>
                    </li>
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, documents.totalPages - 1)}"
                        th:classappend="${i == documents.number} ? ' active'">
                        <a class="page-link"
                           th:text="${i + 1}"
                           th:href="@{/admin/documents(page=${i}, size=${size}, keyword=${keyword})}">
                        </a>
                    </li>
                    <li class="page-item" th:classappend="${documents.last} ? ' disabled'">
                        <a class="page-link"
                           th:href="@{/admin/documents(page=${documents.number + 1}, size=${size}, keyword=${keyword})}">
                            Sau
                        </a>
                    </li>
                </ul>
            </nav>

        </div>
    </div>

</div>
</body>
</html>
