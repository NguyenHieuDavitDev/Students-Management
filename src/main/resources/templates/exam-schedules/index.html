<!doctype html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/dashboard :: layout(
        'Lịch thi học phần',
        'Quản lý lịch thi học phần',
        'Lịch thi theo lớp học phần và loại kỳ thi',
        'exam-schedules',
        ~{::content}
      )}">
<body>
<div th:fragment="content">
<style>
.es-card  { border:none; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.08); }
.es-header {
    background: linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%);
    color:#fff; border-radius:12px 12px 0 0;
    padding:14px 20px; font-weight:600; font-size:1rem;
}
.es-table thead th {
    background:#eff6ff; color:#1d4ed8; font-weight:600;
    border-bottom:2px solid #bfdbfe; padding:10px 12px; white-space:nowrap;
}
.es-table tbody tr:hover { background:#eff6ff; }
.es-table td { vertical-align:middle; padding:10px 12px; }
.summary-card { border:none; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.summary-card .card-body { padding:16px 20px; }
.summary-icon { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
</style>

<div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm">
    <i class="fa-solid fa-circle-check me-2"></i><span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
<div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm">
    <i class="fa-solid fa-triangle-exclamation me-2"></i><span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<div class="row g-3 mb-4">
    <div class="col-sm-6 col-xl-3">
        <div class="summary-card card h-100">
            <div class="card-body d-flex align-items-center gap-3">
                <div class="summary-icon bg-primary bg-opacity-10 text-primary">
                    <i class="fa-solid fa-calendar-days"></i>
                </div>
                <div>
                    <div class="small text-muted">Tổng lịch thi</div>
                    <div class="fw-bold fs-5" th:text="${items.totalElements}">0</div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-sm-6 col-xl-3">
        <div class="summary-card card h-100">
            <div class="card-body d-flex align-items-center gap-3">
                <div class="summary-icon bg-info bg-opacity-10 text-info">
                    <i class="fa-solid fa-list"></i>
                </div>
                <div>
                    <div class="small text-muted">Trang</div>
                    <div class="fw-bold fs-5" th:text="|${items.number + 1}/${items.totalPages == 0 ? 1 : items.totalPages}|">1/1</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="card es-card">
    <div class="es-header d-flex justify-content-between align-items-center flex-wrap gap-2">
        <span><i class="fa-solid fa-calendar-check me-2"></i>Lịch thi học phần</span>
        <div class="d-flex gap-2 flex-wrap">
            <a class="btn btn-light btn-sm" th:href="@{/admin/exam-schedules/print(keyword=${keyword}, fromDate=${fromDate}, toDate=${toDate})}" target="_blank">
                <i class="fa-solid fa-print me-1"></i>In
            </a>
            <a class="btn btn-light btn-sm" th:href="@{/admin/exam-schedules/export}">
                <i class="fa-solid fa-file-excel me-1"></i>Export Excel
            </a>
            <a class="btn btn-primary btn-sm fw-semibold text-white" th:href="@{/admin/exam-schedules/new}">
                <i class="fa-solid fa-plus me-1"></i>Thêm lịch thi
            </a>
        </div>
    </div>

    <div class="card-body">
        <form class="row g-2 mb-3" method="get" th:action="@{/admin/exam-schedules}">
            <div class="col-12 col-md-5">
                <div class="input-group input-group-sm">
                    <span class="input-group-text bg-white border-end-0">
                        <i class="fa-solid fa-magnifying-glass text-muted"></i>
                    </span>
                    <input class="form-control border-start-0" name="keyword"
                           placeholder="Mã LHP, mã học phần, tên học phần, học kỳ, loại kỳ thi..."
                           th:value="${keyword}" autocomplete="off">
                </div>
            </div>
            <div class="col-6 col-md-2">
                <input type="date" class="form-control form-control-sm" name="fromDate" th:value="${fromDate}">
            </div>
            <div class="col-6 col-md-2">
                <input type="date" class="form-control form-control-sm" name="toDate" th:value="${toDate}">
            </div>
            <div class="col-6 col-md-2">
                <select class="form-select form-select-sm" name="size">
                    <option th:each="n : ${#numbers.sequence(10,50,10)}"
                            th:value="${n}" th:text="${n} + ' / trang'"
                            th:selected="${n == size}"></option>
                </select>
            </div>
            <div class="col-auto">
                <button class="btn btn-primary btn-sm px-3"><i class="fa-solid fa-filter me-1"></i>Lọc</button>
                <a class="btn btn-outline-secondary btn-sm ms-1" th:href="@{/admin/exam-schedules}"><i class="fa-solid fa-rotate-left"></i></a>
            </div>
        </form>

        <div class="table-responsive">
            <table class="table es-table mb-0">
                <thead>
                <tr>
                    <th style="width:46px">#</th>
                    <th>Mã LHP</th>
                    <th>Học phần</th>
                    <th>Học kỳ</th>
                    <th>Loại kỳ thi</th>
                    <th class="text-center">Ngày thi</th>
                    <th class="text-center">Giờ thi</th>
                    <th class="text-end" style="width:130px">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="e, stat : ${items.content}">
                    <td class="text-muted small" th:text="${items.number * size + stat.count}"></td>
                    <td th:text="${e.classSectionCode}"></td>
                    <td>
                        <div class="fw-semibold" th:text="${e.courseName}"></div>
                        <div class="small text-muted" th:text="${e.courseCode}"></div>
                    </td>
                    <td class="small" th:text="${e.semesterName}"></td>
                    <td class="small" th:text="${e.examTypeName}"></td>
                    <td class="text-center small" th:text="${#temporals.format(e.examDate, 'dd/MM/yyyy')}"></td>
                    <td class="text-center small" th:text="${#temporals.format(e.startTime, 'HH:mm')} + ' (' + e.durationMinutes + ' phút)' "></td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/exam-schedules/{id}/edit(id=${e.id})}" title="Chỉnh sửa">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </a>
                        <form method="post" th:action="@{/admin/exam-schedules/{id}/delete(id=${e.id})}"
                              style="display:inline;"
                              onsubmit="return confirm('Bạn có chắc muốn xóa lịch thi này?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Xóa">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${items.content.isEmpty()}">
                    <td colspan="8" class="text-center py-5 text-muted">
                        <i class="fa-solid fa-calendar-days fa-2x d-block mb-2 opacity-40"></i>
                        Chưa có lịch thi nào. <a th:href="@{/admin/exam-schedules/new}">Thêm lịch thi</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex align-items-center justify-content-between mt-3 flex-wrap gap-2">
            <small class="text-muted">
                Hiển thị <strong th:text="${items.numberOfElements}">0</strong> /
                <strong th:text="${items.totalElements}">0</strong> lịch thi
            </small>
            <nav th:if="${items.totalPages > 1}">
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${items.first} ? ' disabled'">
                        <a class="page-link"
                           th:href="@{/admin/exam-schedules(page=${items.number - 1}, size=${size}, keyword=${keyword}, fromDate=${fromDate}, toDate=${toDate})}">
                            <i class="fa-solid fa-chevron-left"></i>
                        </a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, items.totalPages - 1)}"
                        class="page-item" th:classappend="${i == items.number} ? ' active'">
                        <a class="page-link" th:text="${i + 1}"
                           th:href="@{/admin/exam-schedules(page=${i}, size=${size}, keyword=${keyword}, fromDate=${fromDate}, toDate=${toDate})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${items.last} ? ' disabled'">
                        <a class="page-link"
                           th:href="@{/admin/exam-schedules(page=${items.number + 1}, size=${size}, keyword=${keyword}, fromDate=${fromDate}, toDate=${toDate})}">
                            <i class="fa-solid fa-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

</div>
</body>
</html>
