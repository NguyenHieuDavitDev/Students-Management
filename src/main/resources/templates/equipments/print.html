<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>In danh sách thiết bị</title>
    <style>
        @page { size: A4; margin: 20mm; }
        body { font-family: "Segoe UI", Arial, sans-serif; font-size: 13px; color: #000; }
        .header { text-align: center; margin-bottom: 16px; }
        .header h2 { margin: 0; font-size: 20px; text-transform: uppercase; }
        .header .sub { font-size: 12px; margin-top: 4px; }
        .info { margin-bottom: 10px; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #000; padding: 6px 8px; }
        th { background: #f2f2f2; text-align: center; font-weight: 600; }
        td { vertical-align: middle; }
        .text-center { text-align: center; }
        .footer { margin-top: 20px; display: flex; justify-content: space-between; font-size: 12px; }
        .signature { text-align: center; width: 200px; }
        .signature p { margin: 0; }
    </style>
</head>
<body onload="window.print()">

<div class="header">
    <h2>DANH SÁCH THIẾT BỊ</h2>
    <div class="sub">
        Ngày in:
        <span th:text="${#dates.format(#dates.createNow(), 'dd/MM/yyyy')}"></span>
    </div>
</div>

<div class="info">
    Tổng số thiết bị:
    <strong th:text="${equipments.size()}"></strong>
</div>

<table>
    <thead>
    <tr>
        <th style="width:40px">STT</th>
        <th style="width:100px">Mã</th>
        <th>Tên thiết bị</th>
        <th style="width:100px">Số serial</th>
        <th style="width:90px">Ngày mua</th>
        <th style="width:90px">Trạng thái</th>
        <th style="width:120px">Phòng</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="e, i : ${equipments}">
        <td class="text-center" th:text="${i.index + 1}"></td>
        <td th:text="${e.equipmentCode}"></td>
        <td th:text="${e.equipmentName}"></td>
        <td th:text="${e.serialNumber}"></td>
        <td class="text-center" th:text="${e.purchaseDate != null ? #temporals.format(e.purchaseDate, 'dd/MM/yyyy') : ''}"></td>
        <td class="text-center" th:text="${e.status}"></td>
        <td th:text="${e.roomName != null ? e.roomCode + ' - ' + e.roomName : '—'}"></td>
    </tr>
    <tr th:if="${equipments.isEmpty()}">
        <td colspan="7" class="text-center">Không có dữ liệu thiết bị</td>
    </tr>
    </tbody>
</table>

<div class="footer">
    <div></div>
    <div class="signature">
        <p><strong>Người lập danh sách</strong></p>
        <p style="margin-top: 40px;">(Ký, ghi rõ họ tên)</p>
    </div>
</div>

</body>
</html>
