<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/dashboard :: layout(
        (${mode}=='edit'?'Chỉnh sửa giảng viên':'Thêm giảng viên'),
        (${mode}=='edit'?'Chỉnh sửa giảng viên':'Thêm giảng viên'),
        'Form giảng viên',
        'lecturers',
        ~{::content}
      )}">
<body>
<div th:fragment="content">

    <div class="alert alert-danger"
         th:if="${globalError}"
         th:text="${globalError}"></div>

    <form method="post"
          th:action="${mode}=='edit'
        ? @{/admin/lecturers/{id}(id=${lecturerId})}
        : @{/admin/lecturers}"
          th:object="${lecturerRequest}"
          enctype="multipart/form-data">

        <div class="mb-3">
            <label>Mã giảng viên <span class="text-danger">*</span></label>
            <input class="form-control" th:field="*{lecturerCode}">
            <small class="text-danger" th:errors="*{lecturerCode}"></small>
        </div>

        <div class="mb-3">
            <label>Họ tên <span class="text-danger">*</span></label>
            <input class="form-control" th:field="*{fullName}">
            <small class="text-danger" th:errors="*{fullName}"></small>
        </div>

        <div class="mb-3">
            <label>Ảnh đại diện</label>
            <input type="file"
                   class="form-control"
                   th:field="*{avatarFile}"
                   accept="image/*">

            <div class="mt-2" th:if="*{avatar} != null and *{avatar} != ''">
                <p class="mb-1 text-muted">Ảnh hiện tại:</p>
                <img th:src="*{avatar}"
                     alt="Avatar"
                     style="max-height: 120px; border-radius: 4px;">
            </div>
        </div>

        <div class="mb-3">
            <label>Ngày sinh</label>
            <input type="date" class="form-control" th:field="*{dateOfBirth}">
            <small class="text-danger" th:errors="*{dateOfBirth}"></small>
        </div>

        <div class="mb-3">
            <label>Giới tính</label>
            <select class="form-select" th:field="*{gender}">
                <option value="">-- Chọn --</option>
                <option value="Nam">Nam</option>
                <option value="Nữ">Nữ</option>
                <option value="Khác">Khác</option>
            </select>
        </div>

        <div class="mb-3">
            <label>CCCD</label>
            <input class="form-control" th:field="*{citizenId}">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" th:field="*{email}">
            <small class="text-danger" th:errors="*{email}"></small>
        </div>

        <div class="mb-3">
            <label>SĐT</label>
            <input class="form-control" th:field="*{phoneNumber}">
        </div>

        <div class="mb-3">
            <label>Địa chỉ</label>
            <input class="form-control" th:field="*{address}">
        </div>

        <div class="mb-3">
            <label>Học vị</label>
            <select class="form-select" th:field="*{positionId}">
                <option value="">-- Chọn --</option>
                <option th:each="p : ${positions}"
                        th:value="${p.positionId}"
                        th:text="${p.positionName}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label>Chức vụ</label>
            <select class="form-select" th:field="*{lecturerDutyId}">
                <option value="">-- Chọn --</option>
                <option th:each="duty : ${lecturerDuties}"
                        th:value="${duty.lecturerDutyId}"
                        th:text="${duty.dutyName}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label>Học hàm</label>
            <select class="form-select" th:field="*{academicTitle}">
                <option value="">-- Chọn --</option>
                <option value="Giảng viên">Giảng viên</option>
                <option value="Giảng viên chính">Giảng viên chính</option>
                <option value="Phó Giáo sư">Phó Giáo sư</option>
                <option value="Giáo sư">Giáo sư</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Khoa <span class="text-danger">*</span></label>
            <select class="form-select" th:field="*{facultyId}">
                <option value="">-- Chọn khoa --</option>
                <option th:each="f : ${faculties}"
                        th:value="${f.facultyId}"
                        th:text="${f.facultyName}">
                </option>
            </select>
            <small class="text-danger" th:errors="*{facultyId}"></small>
        </div>

        <div class="mb-3">
            <label>Phòng ban</label>
            <select class="form-select" th:field="*{departmentId}">
                <option value="">-- Chọn phòng ban --</option>
                <option th:each="d : ${departments}"
                        th:value="${d.departmentId}"
                        th:text="${d.departmentName}">
                </option>
            </select>
        </div>

        <button class="btn btn-primary">Lưu</button>
        <a class="btn btn-secondary" th:href="@{/admin/lecturers}">Huỷ</a>
    </form>

    <div class="card mt-4" th:if="${mode}=='edit'">
        <div class="card-header fw-semibold">
            Phân công giảng dạy (lớp học phần)
        </div>
        <div class="card-body">
            <p class="text-muted small mb-2">
                Dữ liệu đồng bộ từ <a th:href="@{/admin/lecturer-course-classes}">Phân công giảng viên</a>.
                Chỉnh sửa phân công tại đó — không nhập lại ở đây.
            </p>
            <div class="table-responsive" th:if="${teachingAssignments != null and !teachingAssignments.isEmpty()}">
                <table class="table table-sm table-hover mb-0">
                    <thead>
                    <tr>
                        <th>Lớp học phần</th>
                        <th>Môn</th>
                        <th>Học kỳ</th>
                        <th>Lớp hành chính</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="a : ${teachingAssignments}">
                        <td>
                            <span class="fw-medium" th:text="${a.sectionCode}"></span>
                            <span class="text-muted small d-block" th:text="${a.sectionName}"></span>
                        </td>
                        <td th:text="${a.courseCode != null and a.courseName != null} ? |${a.courseCode} — ${a.courseName}| : '—'"></td>
                        <td th:text="${a.semesterCode != null ? a.semesterCode : '—'}"></td>
                        <td>
                            <span th:if="${a.administrativeClassCode != null}"
                                  th:text="|${a.administrativeClassCode} — ${a.administrativeClassName}|"></span>
                            <span class="text-muted" th:if="${a.administrativeClassCode == null}">—</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <p class="text-muted mb-0" th:if="${teachingAssignments == null or teachingAssignments.isEmpty()}">
                Chưa có phân công lớp học phần.
            </p>
        </div>
    </div>

</div>
</body>
</html>
