<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/user-layout :: layout('Trang chủ - Students Management', ~{::content})}">
<head>
    <meta charset="utf-8"/>
    <title>Trang chủ</title>
</head>
<body>
<div th:fragment="content">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h3 mb-3">Trang chủ</h1>
                        <p class="text-muted mb-4" th:if="${userProfile != null}">
                            Xin chào <strong th:text="${userProfile.displayName}">User</strong>.
                            Đây là trang dành cho người dùng (sinh viên / giảng viên).
                            Bạn có thể xem thông tin cá nhân tại header và footer.
                        </p>
                        <p class="text-muted mb-4" th:if="${userProfile == null}">
                            Đây là trang chủ hệ thống quản lý đào tạo.
                            Vui lòng <a th:href="@{/login}">đăng nhập</a> để sử dụng đầy đủ tính năng.
                        </p>
                        <div th:if="${userProfile != null and userProfile.canAccessDashboard}">
                            <a class="btn btn-primary" th:href="@{/admin}">
                                <i class="fa-solid fa-gauge-high me-1"></i>Vào trang quản lý
                            </a>
                        </div>
                        <div th:if="${userProfile == null}">
                            <a class="btn btn-outline-primary" th:href="@{/login}">
                                <i class="fa-solid fa-right-to-bracket me-1"></i>Đăng nhập
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
