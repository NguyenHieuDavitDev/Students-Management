<!doctype html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/dashboard :: layout(
        'Thành phần điểm',
        'Danh sách thành phần điểm',
        'Quản lý thành phần điểm (grade_components)',
        'grade-components',
        ~{::content}
      )}">
<body>
<div th:fragment="content">

    <div th:if="${success}" class="alert alert-success">
        <i class="fa-solid fa-circle-check me-1"></i>
        <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger">
        <i class="fa-solid fa-triangle-exclamation me-1"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="d-flex justify-content-between mb-3">
                <form class="d-flex gap-2" method="get" th:action="@{/admin/grade-components}">
                    <input class="form-control"
                           name="keyword"
                           placeholder="Tìm theo tên thành phần, mã lớp, học phần..."
                           th:value="${keyword}">
                    <input type="hidden" name="size" th:value="${size}">
                    <button class="btn btn-outline-primary">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        Tìm
                    </button>
                </form>
                <div class="d-flex gap-2">
                    <a class="btn btn-outline-success" th:href="@{/admin/grade-components/export}">
                        <i class="fa-solid fa-file-excel"></i>
                        Export
                    </a>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/grade-components/print}" target="_blank">
                        <i class="fa-solid fa-print"></i>
                        In
                    </a>
                    <a class="btn btn-primary" th:href="@{/admin/grade-components/new}">
                        <i class="fa-solid fa-plus"></i>
                        Thêm mới
                    </a>
                </div>
            </div>

            <form method="post" enctype="multipart/form-data" th:action="@{/admin/grade-components/import}"
                  class="mb-3 d-flex gap-2">
                <input type="file" name="file" class="form-control" accept=".xlsx,.xls" required>
                <button class="btn btn-outline-primary">
                    <i class="fa-solid fa-upload"></i>
                    Import
                </button>
            </form>

            <table class="table table-hover">
                <thead>
                <tr>
                    <th>Lớp học phần</th>
                    <th>Học phần</th>
                    <th>Tên thành phần điểm</th>
                    <th class="text-center">Trọng số (%)</th>
                    <th class="text-center">Điểm tối đa</th>
                    <th class="text-end">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="g : ${items.content}">
                    <td>
                        <span th:text="${g.classCode}"></span>
                        <span class="text-muted small" th:if="${g.className}" th:text="' - ' + ${g.className}"></span>
                    </td>
                    <td>
                        <span th:text="${g.courseCode}"></span>
                        <span class="text-muted small" th:if="${g.courseName}" th:text="' ' + ${g.courseName}"></span>
                    </td>
                    <td th:text="${g.componentName}"></td>
                    <td class="text-center" th:text="${g.weight != null ? #numbers.formatDecimal(g.weight, 1, 2) : '-'}"></td>
                    <td class="text-center" th:text="${g.maxScore != null ? #numbers.formatDecimal(g.maxScore, 1, 2) : '-'}"></td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/grade-components/{id}/edit(id=${g.id})}">
                            <i class="fa-solid fa-pen-to-square"></i>
                            Sửa
                        </a>
                        <form method="post" th:action="@{/admin/grade-components/{id}/delete(id=${g.id})}"
                              style="display:inline;" onsubmit="return confirm('Bạn có chắc chắn muốn xóa thành phần điểm này?');">
                            <button class="btn btn-sm btn-outline-danger">
                                <i class="fa-solid fa-trash"></i>
                                Xóa
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${items.content.isEmpty()}">
                    <td colspan="6" class="text-center text-muted">
                        <i class="fa-solid fa-box-open"></i>
                        Không có dữ liệu thành phần điểm
                    </td>
                </tr>
                </tbody>
            </table>

            <nav th:if="${items.totalPages > 1}">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${items.first} ? ' disabled'">
                        <a class="page-link" th:href="@{/admin/grade-components(page=${items.number - 1}, size=${size}, keyword=${keyword})}">Trước</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, items.totalPages - 1)}"
                        th:classappend="${i == items.number} ? ' active'">
                        <a class="page-link" th:text="${i + 1}"
                           th:href="@{/admin/grade-components(page=${i}, size=${size}, keyword=${keyword})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${items.last} ? ' disabled'">
                        <a class="page-link" th:href="@{/admin/grade-components(page=${items.number + 1}, size=${size}, keyword=${keyword})}">Sau</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
</body>
</html>
