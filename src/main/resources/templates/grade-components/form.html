<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/dashboard :: layout(
        (${mode}=='edit'?'Chỉnh sửa thành phần điểm':'Thêm thành phần điểm'),
        (${mode}=='edit'?'Chỉnh sửa thành phần điểm':'Thêm thành phần điểm'),
        'Form thành phần điểm',
        'grade-components',
        ~{::content}
      )}">
<body>
<div th:fragment="content">
    <div class="alert alert-danger" th:if="${globalError}" th:text="${globalError}"></div>

    <form method="post"
          th:action="${mode}=='edit'
            ? @{/admin/grade-components/{id}(id=${componentId})}
            : @{/admin/grade-components}"
          th:object="${gradeComponentRequest}">
        <div class="row g-3">
            <div class="col-md-12">
                <label>Lớp học phần <span class="text-danger">*</span></label>
                <select class="form-select" th:field="*{courseClassId}">
                    <option value="">-- Chọn lớp học phần --</option>
                    <option th:each="cs : ${classSections}" th:value="${cs.id}"
                            th:text="${cs.classCode + ' - ' + cs.className + (cs.course != null ? ' (' + cs.course.courseCode + ')' : '')}"></option>
                </select>
                <small class="text-danger" th:errors="*{courseClassId}"></small>
            </div>
            <div class="col-md-12">
                <label>Tên thành phần điểm <span class="text-danger">*</span></label>
                <input type="text" class="form-control" th:field="*{componentName}" maxlength="100" placeholder="Ví dụ: Điểm giữa kỳ, Điểm cuối kỳ">
                <small class="text-danger" th:errors="*{componentName}"></small>
            </div>
            <div class="col-md-6">
                <label>Trọng số (%)</label>
                <input type="number" step="0.01" min="0" max="100" class="form-control" th:field="*{weight}" placeholder="0–100">
                <small class="text-danger" th:errors="*{weight}"></small>
            </div>
            <div class="col-md-6">
                <label>Điểm tối đa</label>
                <input type="number" step="0.01" min="0" class="form-control" th:field="*{maxScore}" placeholder="Ví dụ: 10">
                <small class="text-danger" th:errors="*{maxScore}"></small>
            </div>
        </div>
        <div class="mt-3">
            <button class="btn btn-primary">Lưu</button>
            <a class="btn btn-secondary" th:href="@{/admin/grade-components}">Huỷ</a>
        </div>
    </form>
</div>
</body>
</html>
