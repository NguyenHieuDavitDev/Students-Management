<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>In danh sách lịch học</title>
    <style>
        @page { size: A4 landscape; margin: 15mm; }
        body { font-family: "Segoe UI", Arial; font-size: 12px; }
        .header { text-align: center; margin-bottom: 12px; }
        .header h2 { margin: 0; font-size: 18px; text-transform: uppercase; }
        .header .sub { font-size: 11px; margin-top: 4px; }
        .info { margin-bottom: 8px; font-size: 11px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #000; padding: 4px 6px; }
        th { background: #f2f2f2; text-align: center; font-weight: 600; font-size: 11px; }
        td { vertical-align: middle; }
        .text-center { text-align: center; }
        .footer { margin-top: 16px; text-align: right; font-size: 11px; }
    </style>
</head>
<body onload="window.print()">

<div class="header">
    <h2>DANH SÁCH LỊCH HỌC</h2>
    <div class="sub">Ngày in: <span th:text="${#dates.format(#dates.createNow(), 'dd/MM/yyyy')}"></span></div>
</div>

<div class="info">Tổng số: <strong th:text="${schedules.size()}"></strong></div>

<table>
    <thead>
    <tr>
        <th style="width:28px">STT</th>
        <th style="width:70px">Học kỳ</th>
        <th style="width:80px">Lớp HP</th>
        <th style="width:100px">Tên học phần</th>
        <th>Giảng viên</th>
        <th style="width:60px">Phòng</th>
        <th style="width:75px">Khung giờ</th>
        <th style="width:35px">Thứ</th>
        <th style="width:55px">Tuần</th>
        <th style="width:50px">Loại</th>
        <th style="width:60px">Trạng thái</th>
        <th>Ghi chú</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="s, i : ${schedules}">
        <td class="text-center" th:text="${i.index + 1}"></td>
        <td th:text="${s.semesterCode}"></td>
        <td th:text="${s.classSectionCode}"></td>
        <td th:text="${s.courseName}"></td>
        <td th:text="${s.lecturerName}"></td>
        <td th:text="${'Phòng ' + s.roomCode}"></td>
        <td th:text="${s.timeSlotCode + ' (' + #temporals.format(s.timeSlotStartTime, 'HH:mm') + '-' + #temporals.format(s.timeSlotEndTime, 'HH:mm') + ')'}"></td>
        <td class="text-center" th:text="${s.dayOfWeek}"></td>
        <td class="text-center" th:text="${s.startWeek + '-' + s.endWeek}"></td>
        <td class="text-center" th:text="${s.sessionType?.name()}"></td>
        <td class="text-center" th:text="${s.status?.name()}"></td>
        <td th:text="${s.note}"></td>
    </tr>
    <tr th:if="${schedules.isEmpty()}">
        <td colspan="12" class="text-center">Không có dữ liệu lịch học</td>
    </tr>
    </tbody>
</table>

<div class="footer">
    <p><strong>Người lập</strong></p>
    <p style="margin-top:30px;">(Ký, ghi rõ họ tên)</p>
</div>

</body>
</html>
