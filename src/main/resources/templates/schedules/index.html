<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/dashboard :: layout(
        'Lịch học',
        'Danh sách lịch học',
        'Quản lý lịch học',
        'schedules',
        ~{::content}
      )}">
<body>
<div th:fragment="content">

    <div th:if="${success}" class="alert alert-success">
        <i class="fa-solid fa-circle-check me-1"></i>
        <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger">
        <i class="fa-solid fa-triangle-exclamation me-1"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card">
        <div class="card-body">

            <div class="d-flex justify-content-between mb-3 flex-wrap gap-2">
                <form class="d-flex gap-2" method="get" th:action="@{/admin/schedules}">
                    <input class="form-control"
                           name="keyword"
                           placeholder="Tìm theo học kỳ, lớp HP, GV, phòng, khung giờ..."
                           th:value="${keyword}"
                           style="min-width: 260px;">
                    <button class="btn btn-outline-primary">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        Tìm
                    </button>
                </form>
                <div class="d-flex gap-2 flex-wrap">
                    <form class="d-flex gap-2" th:action="@{/admin/schedules/import}" method="post" enctype="multipart/form-data">
                        <input type="file" name="file" class="form-control form-control-sm" accept=".xlsx,.xls" required>
                        <button class="btn btn-outline-success btn-sm" type="submit">
                            <i class="fa-solid fa-file-import"></i> Import
                        </button>
                    </form>
                    <a class="btn btn-outline-success" th:href="@{/admin/schedules/export}">
                        <i class="fa-solid fa-file-excel"></i> Export
                    </a>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/schedules/print}" target="_blank">
                        <i class="fa-solid fa-print"></i> In
                    </a>
                    <a class="btn btn-info" th:href="@{/admin/schedules/auto}">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Phân lịch tự động
                    </a>
                    <a class="btn btn-outline-info" th:href="@{/admin/schedules/calendar}">
                        <i class="fa-solid fa-calendar-days"></i> Lịch (calendar)
                    </a>
                    <a class="btn btn-primary" th:href="@{/admin/schedules/new}">
                        <i class="fa-solid fa-plus"></i> Thêm mới
                    </a>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle table-sm">
                    <thead>
                    <tr>
                        <th>Học kỳ</th>
                        <th>Lớp HP</th>
                        <th>Tên học phần</th>
                        <th>Giảng viên</th>
                        <th>Phòng</th>
                        <th>Khung giờ</th>
                        <th class="text-center">Thứ</th>
                        <th class="text-center">Tuần</th>
                        <th>Loại buổi</th>
                        <th>Trạng thái</th>
                        <th class="text-end">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="s : ${schedules.content}">
                        <td th:text="${s.semesterCode}"></td>
                        <td th:text="${s.classSectionCode}"></td>
                        <td th:text="${s.courseName}"></td>
                        <td th:text="${s.lecturerName}"></td>
                        <td th:text="${'Phòng ' + s.roomCode}"></td>
                        <td th:text="${s.timeSlotCode + ' (' + #temporals.format(s.timeSlotStartTime, 'HH:mm') + '-' + #temporals.format(s.timeSlotEndTime, 'HH:mm') + ')'}"></td>
                        <td class="text-center" th:text="${s.dayOfWeek}"></td>
                        <td class="text-center" th:text="${s.startWeek + '-' + s.endWeek}"></td>
                        <td>
                            <span th:if="${s.sessionType?.name() == 'THEORY'}" class="badge bg-info">LT</span>
                            <span th:if="${s.sessionType?.name() == 'PRACTICE'}" class="badge bg-primary">TH</span>
                            <span th:if="${s.sessionType?.name() == 'EXAM'}" class="badge bg-warning">Thi</span>
                        </td>
                        <td>
                            <span th:if="${s.status?.name() == 'ACTIVE'}" class="badge bg-success">Hoạt động</span>
                            <span th:if="${s.status?.name() == 'CANCELLED'}" class="badge bg-secondary">Hủy</span>
                            <span th:if="${s.status?.name() == 'MOVED'}" class="badge bg-warning">Chuyển</span>
                        </td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/schedules/{id}/edit(id=${s.id})}">
                                <i class="fa-solid fa-pen-to-square"></i> Sửa
                            </a>
                            <form method="post" th:action="@{/admin/schedules/{id}/delete(id=${s.id})}" style="display:inline;"
                                  onsubmit="return confirm('Bạn có chắc muốn xóa lịch này?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-trash"></i> Xóa</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${schedules.content.isEmpty()}">
                        <td colspan="11" class="text-center text-muted">
                            <i class="fa-solid fa-box-open"></i> Không có dữ liệu lịch học
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${schedules.totalPages > 1}" class="mt-3">
                <ul class="pagination justify-content-center mb-0">
                    <li class="page-item" th:classappend="${schedules.first} ? 'disabled' : ''">
                        <a class="page-link" th:href="@{/admin/schedules(page=${schedules.number - 1}, keyword=${keyword})}">Trước</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, schedules.totalPages - 1)}" th:classappend="${i == schedules.number} ? 'active' : ''">
                        <a class="page-link" th:text="${i + 1}" th:href="@{/admin/schedules(page=${i}, keyword=${keyword})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${schedules.last} ? 'disabled' : ''">
                        <a class="page-link" th:href="@{/admin/schedules(page=${schedules.number + 1}, keyword=${keyword})}">Sau</a>
                    </li>
                </ul>
            </nav>

        </div>
    </div>

</div>
</body>
</html>
