<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quên mật khẩu - Students Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root { --primary: #343a40; --primary-light: #495057; --accent: #0d6efd; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1d21 0%, #343a40 50%, #495057 100%);
            font-family: "Segoe UI", system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .auth-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,.25);
            overflow: hidden;
            max-width: 420px;
            width: 100%;
        }
        .auth-header {
            background: var(--primary);
            color: #fff;
            padding: 1.5rem;
            text-align: center;
        }
        .auth-header i { font-size: 2rem; margin-bottom: 0.5rem; }
        .auth-header h1 { font-size: 1.25rem; font-weight: 600; margin: 0; }
        .auth-body { padding: 1.75rem; }
        .btn-submit { background: var(--primary); border: none; font-weight: 600; }
        .btn-submit:hover { background: var(--primary-light); }
        .auth-footer { padding: 0 1.75rem 1.75rem; text-align: center; }
        .auth-footer a { color: var(--accent); text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }
        .reset-link-box { word-break: break-all; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="auth-header">
        <i class="fa-solid fa-key"></i>
        <h1>Quên mật khẩu</h1>
        <p class="mb-0 small opacity-85">Nhập email để nhận link đặt lại mật khẩu</p>
    </div>
    <div class="auth-body">
        <div th:if="${message}" class="alert alert-info">
            <i class="fa-solid fa-circle-info me-2"></i>
            <span th:text="${message}"></span>
        </div>
        <div th:if="${resetLink}" class="alert alert-secondary reset-link-box mb-3">
            <strong>Link đặt lại (dùng để kiểm tra):</strong><br>
            <a th:href="${resetLink}" th:text="${resetLink}">Link</a>
        </div>
        <form th:if="${sent != true}" th:action="@{/forgot-password}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="mb-3">
                <label class="form-label">Email đăng ký</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" class="form-control" name="email" placeholder="email@example.com" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-submit w-100">
                <i class="fa-solid fa-paper-plane me-2"></i> Gửi link đặt lại mật khẩu
            </button>
        </form>
        <div th:if="${sent == true and (resetLink == null or resetLink.isEmpty())}" class="text-center text-muted">
            Kiểm tra hộp thư email (và thư mục spam) để lấy link đặt lại mật khẩu.
        </div>
    </div>
    <div class="auth-footer">
        <a th:href="@{/login}"><i class="fa-solid fa-arrow-left me-1"></i> Quay lại đăng nhập</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
