<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="header(pageTitle, pageSubtitle)">
    <div class="content-header">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h1 th:text="${pageTitle} ?: 'Dashboard'">Dashboard</h1>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0 mt-1">
                        <li class="breadcrumb-item" th:text="${pageSubtitle} ?: 'Trang quản trị'"></li>
                    </ol>
                </nav>
            </div>
            <div class="d-flex align-items-center gap-2">
                <button id="sidebarToggle" type="button" class="sidebar-toggle-btn btn btn-default">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <a href="/" class="btn btn-sm btn-outline-secondary">
                    <i class="fa-solid fa-arrow-left-long me-1"></i>Về trang user
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
