<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout (title, pageTitle, pageSubtitle, activeMenu, content)">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} ?: 'Dashboard'">Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <style>
        /* AdminLTE-style layout */
        body { background: #f4f6f9; font-family: "Source Sans Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; }
        .wrapper { display: flex; min-height: 100vh; }
        .main-sidebar {
            width: 250px;
            min-width: 250px;
            min-height: 100vh;
            background: #343a40;
            transition: width .3s ease-in-out, margin .3s ease-in-out;
        }
        .main-sidebar .brand-link {
            display: flex;
            align-items: center;
            padding: 15px 15px 15px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            background: rgba(0,0,0,.1);
            border-bottom: 1px solid rgba(255,255,255,.1);
        }
        .main-sidebar .brand-link .brand-image { margin-right: 10px; }
        .main-sidebar .brand-link .brand-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .main-sidebar .sidebar {
            height: calc(100vh - 70px);
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,.3) transparent;
        }
        .main-sidebar .sidebar::-webkit-scrollbar { width: 6px; }
        .main-sidebar .sidebar::-webkit-scrollbar-track { background: transparent; }
        .main-sidebar .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,.25); border-radius: 3px; }
        .main-sidebar .nav-sidebar {
            flex-direction: column;
            padding: 10px 0;
            list-style: none;
            margin: 0;
        }
        .main-sidebar .nav-sidebar .nav-item { width: 100%; list-style: none; margin: 0; }
        .main-sidebar .nav-sidebar .nav-link {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            color: rgba(255,255,255,.8);
            text-decoration: none;
            border-left: 3px solid transparent;
            white-space: nowrap;
        }
        .main-sidebar .nav-sidebar .nav-link i {
            width: 24px;
            margin-right: 12px;
            text-align: center;
        }
        .main-sidebar .nav-sidebar .nav-link:hover {
            color: #fff;
            background: rgba(255,255,255,.1);
        }
        .main-sidebar .nav-sidebar .nav-link.active {
            color: #fff;
            background: rgba(255,255,255,.1);
            border-left-color: #007bff;
        }
        .main-sidebar .nav-header {
            padding: 10px 20px;
            font-size: .75rem;
            color: rgba(255,255,255,.5);
            text-transform: uppercase;
            letter-spacing: .5px;
            list-style: none;
        }
        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .content-header {
            padding: 15px 20px;
            background: #fff;
            border-bottom: 1px solid #dee2e6;
        }
        .content-header h1 { margin: 0; font-size: 1.5rem; font-weight: 600; }
        .content-header .breadcrumb { margin: 0; background: transparent; padding: 0; }
        .content { flex: 1; padding: 20px; }
        .card {
            border: 0;
            border-radius: 4px;
            box-shadow: 0 0 1px rgba(0,0,0,.125), 0 1px 3px rgba(0,0,0,.2);
        }
        .card-header {
            background: #fff;
            border-bottom: 1px solid rgba(0,0,0,.125);
            padding: 12px 20px;
            font-weight: 600;
        }
        .card-body { padding: 20px; }
        .btn { border-radius: 4px; }
        .form-control, .form-select { border-radius: 4px; }
        .table thead th {
            font-size: .8rem;
            text-transform: uppercase;
            font-weight: 600;
            color: #6c757d;
        }
        .alert { border-radius: 4px; }
        .pagination .page-link { border-radius: 4px; }
        .sidebar-toggle-btn { border: 1px solid #dee2e6; background: #fff; padding: 6px 12px; cursor: pointer; border-radius: 4px; }
        .sidebar-toggle-btn:hover { background: #f8f9fa; }
        /* Collapsed sidebar */
        .sidebar-collapsed .main-sidebar { width: 70px; min-width: 70px; }
        .sidebar-collapsed .brand-link .brand-text,
        .sidebar-collapsed .nav-link span,
        .sidebar-collapsed .nav-header { display: none !important; }
        .sidebar-collapsed .nav-link { justify-content: center; padding: 10px; }
        .sidebar-collapsed .nav-link i { margin-right: 0; }
    </style>
</head>
<body>
<div class="wrapper">
    <aside th:replace="~{layout/sidebar :: sidebar(${activeMenu})}"></aside>
    <div class="content-wrapper">
        <div class="content-header" th:replace="~{layout/header :: header(${pageTitle}, ${pageSubtitle})}">
        </div>
        <section class="content">
            <div th:replace="${content}"></div>
        </section>
    </div>
</div>
<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
