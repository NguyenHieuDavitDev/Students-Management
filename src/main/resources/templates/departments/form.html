<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/dashboard :: layout(
        (${mode}=='edit'?'Chỉnh sửa phòng ban':'Thêm phòng ban mới'),
        (${mode}=='edit'?'Chỉnh sửa phòng ban':'Thêm phòng ban mới'),
        'Form phòng ban',
        'departments',
        ~{::content}
      )}">
<body>
<div th:fragment="content">

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <div class="alert alert-danger" th:if="${globalError}" th:text="${globalError}"></div>

            <form method="post"
                  th:action="${mode}=='edit'
                    ? @{/admin/departments/{id}(id=${departmentId})}
                    : @{/admin/departments}"
                  th:object="${departmentRequest}">

                <div class="mb-3">
                    <label class="form-label">Mã phòng ban <span class="text-danger">*</span></label>
                    <input class="form-control"
                           th:field="*{departmentCode}"
                           placeholder="Ví dụ: PDAO-TAO">
                    <div class="text-danger small" th:errors="*{departmentCode}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tên phòng ban <span class="text-danger">*</span></label>
                    <input class="form-control"
                           th:field="*{departmentName}"
                           placeholder="Ví dụ: Phòng đào tạo">
                    <div class="text-danger small" th:errors="*{departmentName}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Mô tả</label>
                    <textarea class="form-control"
                              th:field="*{description}"
                              rows="3"
                              placeholder="Mô tả ngắn về chức năng phòng ban"></textarea>
                    <div class="text-danger small" th:errors="*{description}"></div>
                </div>

                <div class="d-flex gap-2">
                    <button class="btn btn-primary">
                        <i class="fa-solid fa-save me-1"></i> Lưu
                    </button>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/departments}">Hủy</a>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
