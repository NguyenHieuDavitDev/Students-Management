<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>In danh sách nhân sự</title>
    <style>
        body { font-family: Arial, sans-serif; }
        table { width:100%; border-collapse: collapse; margin-top:20px; }
        th, td { border:1px solid #000; padding:6px; }
        th { background:#f2f2f2; }
        h3 { text-align:center; }
    </style>
</head>
<body onload="window.print()">

<h3>DANH SÁCH NHÂN SỰ</h3>

<table>
    <thead>
    <tr>
        <th>STT</th>
        <th>Mã</th>
        <th>Họ tên</th>
        <th>Loại</th>
        <th>Phòng ban</th>
        <th>Chức danh</th>
        <th>Trạng thái</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="e, i : ${employees}">
        <td th:text="${i.index + 1}"></td>
        <td th:text="${e.employeeCode}"></td>
        <td th:text="${e.fullName}"></td>
        <td th:text="${e.employeeType}"></td>
        <td th:text="${e.departmentName != null ? e.departmentName : '-'}"></td>
        <td th:text="${e.positionName != null ? e.positionName : '-'}"></td>
        <td th:text="${e.status}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
