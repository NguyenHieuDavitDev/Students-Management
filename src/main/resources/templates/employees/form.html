<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/dashboard :: layout(
        (${mode}=='edit'?'Chỉnh sửa nhân sự':'Thêm nhân sự mới'),
        (${mode}=='edit'?'Chỉnh sửa nhân sự':'Thêm nhân sự mới'),
        'Form nhân sự',
        'employees',
        ~{::content}
      )}">
<body>
<div th:fragment="content">

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <div class="alert alert-danger" th:if="${globalError}" th:text="${globalError}"></div>

            <form method="post"
                  th:action="${mode}=='edit'
                    ? @{/admin/employees/{id}(id=${employeeId})}
                    : @{/admin/employees}"
                  th:object="${employeeRequest}"
                  enctype="multipart/form-data">

                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Mã nhân sự <span class="text-danger">*</span></label>
                        <input class="form-control" th:field="*{employeeCode}" placeholder="VD: NV001, BV001...">
                        <div class="text-danger small" th:errors="*{employeeCode}"></div>
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Họ tên <span class="text-danger">*</span></label>
                        <input class="form-control" th:field="*{fullName}">
                        <div class="text-danger small" th:errors="*{fullName}"></div>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Loại nhân sự <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{employeeType}">
                            <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
                        </select>
                        <div class="text-danger small" th:errors="*{employeeType}"></div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Trạng thái</label>
                        <select class="form-select" th:field="*{status}">
                            <option value="ACTIVE">ACTIVE</option>
                            <option value="INACTIVE">INACTIVE</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Ngày sinh</label>
                        <input type="date"
                               class="form-control"
                               id="dateOfBirth"
                               name="dateOfBirth"
                               th:value="${employeeRequest.dateOfBirth != null ? employeeRequest.dateOfBirth : ''}">
                        <div class="text-danger small" th:errors="*{dateOfBirth}"></div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Giới tính</label>
                        <select class="form-select" th:field="*{gender}">
                            <option value="">-- Chọn --</option>
                            <option value="Nam">Nam</option>
                            <option value="Nữ">Nữ</option>
                            <option value="Khác">Khác</option>
                        </select>
                        <div class="text-danger small" th:errors="*{gender}"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">CCCD</label>
                        <input class="form-control" th:field="*{citizenId}">
                        <div class="text-danger small" th:errors="*{citizenId}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Email</label>
                        <input class="form-control" th:field="*{email}">
                        <div class="text-danger small" th:errors="*{email}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">SĐT</label>
                        <input class="form-control" th:field="*{phoneNumber}">
                        <div class="text-danger small" th:errors="*{phoneNumber}"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Địa chỉ</label>
                        <input class="form-control" th:field="*{address}">
                        <div class="text-danger small" th:errors="*{address}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Phòng ban</label>
                        <select class="form-select" th:field="*{departmentId}">
                            <option value="">-- Chọn phòng ban --</option>
                            <option th:each="d : ${departments}"
                                    th:value="${d.departmentId}"
                                    th:text="${d.departmentName}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Chức danh / vị trí</label>
                        <select class="form-select" th:field="*{positionId}">
                            <option value="">-- Chọn --</option>
                            <option th:each="p : ${positions}"
                                    th:value="${p.positionId}"
                                    th:text="${p.positionName}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6" id="facultyRow">
                        <label class="form-label">Khoa (khi là giảng viên) <span class="text-danger faculty-required d-none">*</span></label>
                        <select class="form-select" th:field="*{facultyId}">
                            <option value="">-- Chọn khoa --</option>
                            <option th:each="f : ${faculties}"
                                    th:value="${f.facultyId}"
                                    th:text="${f.facultyName}">
                            </option>
                        </select>
                        <p class="text-muted small mb-0">Bắt buộc khi loại nhân sự là LECTURER (tạo mới hoặc chưa có khoa trên hồ sơ GV).</p>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Số QĐ / ghi chú thay đổi</label>
                        <input class="form-control" th:field="*{decisionNo}" placeholder="VD: 123/QĐ-ĐH ngày ...">
                        <p class="text-muted small mb-0">Ghi khi đổi phòng ban, chức danh hoặc loại nhân sự (lưu lịch sử).</p>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Ảnh đại diện</label>
                        <input type="file" class="form-control" th:field="*{avatarFile}" accept="image/*">
                        <div class="mt-2" th:if="*{avatar} != null and *{avatar} != ''">
                            <p class="mb-1 text-muted">Ảnh hiện tại:</p>
                            <img th:src="*{avatar}" alt="Avatar" style="max-height: 120px; border-radius: 4px;">
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-3">
                    <button class="btn btn-primary">
                        <i class="fa-solid fa-save me-1"></i> Lưu
                    </button>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/employees}">Hủy</a>
                </div>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        (function () {
            var typeSel = document.querySelector('select[name="employeeType"]');
            var facultyRow = document.getElementById('facultyRow');
            if (!typeSel || !facultyRow) return;
            function sync() {
                var v = typeSel.value;
                var isLec = v === 'LECTURER';
                facultyRow.classList.toggle('opacity-50', !isLec);
                facultyRow.querySelectorAll('.faculty-required').forEach(function (el) {
                    el.classList.toggle('d-none', !isLec);
                });
            }
            typeSel.addEventListener('change', sync);
            sync();
        })();
    </script>

</div>
</body>
</html>
