<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/dashboard :: layout(
        'Nhân sự',
        'Danh sách nhân sự',
        'Quản lý toàn bộ nhân sự trong trường',
        'employees',
        ~{::content}
      )}">
<body>
<div th:fragment="content">

    <div th:if="${success}" class="alert alert-success shadow-sm" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger shadow-sm" th:text="${error}"></div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <div class="row g-2 align-items-end mb-3">
                <div class="col-lg-7">
                    <form class="row g-2" method="get" th:action="@{/admin/employees}">
                        <div class="col-md-6">
                            <label class="form-label small text-muted mb-1">Tìm kiếm</label>
                            <input class="form-control"
                                   type="text"
                                   name="keyword"
                                   placeholder="Mã/tên/email/SĐT..."
                                   th:value="${keyword}">
                        </div>
                        <div class="col-md-5">
                            <label class="form-label small text-muted mb-1">Loại nhân sự</label>
                            <select class="form-select" name="type">
                                <option value="">Tất cả</option>
                                <option th:each="t : ${types}"
                                        th:value="${t}"
                                        th:selected="${type != null and type.name() == t.name()}"
                                        th:text="${t}">
                                </option>
                            </select>
                        </div>
                        <div class="col-md-1 d-grid">
                            <label class="form-label small text-muted mb-1">&nbsp;</label>
                            <button class="btn btn-outline-primary">
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </button>
                        </div>
                    </form>
                </div>

                <div class="col-lg-5">
                    <div class="d-flex flex-wrap gap-2 justify-content-lg-end">
                        <a class="btn btn-sm btn-outline-secondary" th:href="@{/admin/employees/print}" target="_blank">
                            <i class="fa-solid fa-print me-1"></i> In
                        </a>
                        <a class="btn btn-sm btn-outline-success" th:href="@{/admin/employees/export}">
                            <i class="fa-solid fa-file-excel me-1"></i> Xuất Excel
                        </a>
                        <form method="post" th:action="@{/admin/employees/import}" enctype="multipart/form-data" class="m-0">
                            <label class="btn btn-sm btn-outline-warning mb-0">
                                <i class="fa-solid fa-file-import me-1"></i> Nhập Excel
                                <input type="file" name="file" hidden accept=".xlsx" onchange="this.form.submit()">
                            </label>
                        </form>
                        <a class="btn btn-sm btn-primary" th:href="@{/admin/employees/new}">
                            <i class="fa-solid fa-plus me-1"></i> Thêm mới
                        </a>
                    </div>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th style="width:72px">Ảnh</th>
                        <th>Mã</th>
                        <th>Họ tên</th>
                        <th>Loại</th>
                        <th>Phòng ban</th>
                        <th>Chức danh</th>
                        <th>Trạng thái</th>
                        <th>Email</th>
                        <th class="text-end">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${employees.content.isEmpty()}">
                        <td colspan="9" class="text-muted text-center">Không có dữ liệu</td>
                    </tr>
                    <tr th:each="e : ${employees.content}">
                        <td>
                            <div class="d-flex align-items-center">
                                <img th:if="${e.avatar != null}"
                                     th:src="${e.avatar}"
                                     alt="Avatar"
                                     style="height: 40px; width: 40px; object-fit: cover; border-radius: 50%;">
                                <div th:if="${e.avatar == null}"
                                     class="rounded-circle bg-secondary-subtle d-flex align-items-center justify-content-center text-secondary"
                                     style="height: 40px; width: 40px;">
                                    <i class="fa-solid fa-user"></i>
                                </div>
                            </div>
                        </td>
                        <td class="fw-semibold" th:text="${e.employeeCode}"></td>
                        <td th:text="${e.fullName}"></td>
                        <td><span class="badge bg-secondary" th:text="${e.employeeType}"></span></td>
                        <td th:text="${e.departmentName != null ? e.departmentName : '-'}"></td>
                        <td th:text="${e.positionName != null ? e.positionName : '-'}"></td>
                        <td th:text="${e.status}"></td>
                        <td th:text="${e.email != null ? e.email : '-'}"></td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-primary"
                               th:href="@{/admin/employees/{id}/edit(id=${e.employeeId})}">
                                <i class="fa-solid fa-pen"></i>
                            </a>
                            <form class="d-inline"
                                  th:action="@{/admin/employees/{id}/delete(id=${e.employeeId})}"
                                  method="post"
                                  onsubmit="return confirm('Bạn có chắc chắn muốn xoá nhân sự này?')">
                                <button class="btn btn-sm btn-outline-danger">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${employees.totalPages > 1}">
                <ul class="pagination mb-0">
                    <li class="page-item" th:classappend="${employees.first} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/employees(page=${employees.number-1},keyword=${keyword},type=${type})}">
                            Trước
                        </a>
                    </li>
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, employees.totalPages-1)}"
                        th:classappend="${i == employees.number} ? 'active'">
                        <a class="page-link"
                           th:text="${i+1}"
                           th:href="@{/admin/employees(page=${i},keyword=${keyword},type=${type})}">
                        </a>
                    </li>
                    <li class="page-item" th:classappend="${employees.last} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/employees(page=${employees.number+1},keyword=${keyword},type=${type})}">
                            Sau
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</div>
</body>
</html>
