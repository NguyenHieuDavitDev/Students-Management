<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng nhập - Students Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #343a40;
            --primary-light: #495057;
            --accent: #0d6efd;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1d21 0%, #343a40 50%, #495057 100%);
            font-family: "Segoe UI", system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,.25);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
        }
        .login-header {
            background: var(--primary);
            color: #fff;
            padding: 1.75rem;
            text-align: center;
        }
        .login-header i {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            opacity: 0.95;
        }
        .login-header h1 {
            font-size: 1.35rem;
            font-weight: 600;
            margin: 0;
        }
        .login-header p {
            font-size: 0.875rem;
            opacity: 0.85;
            margin: 0.25rem 0 0;
        }
        .login-body {
            padding: 2rem;
        }
        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        }
        .btn-login {
            background: var(--primary);
            border: none;
            padding: 0.6rem 1.25rem;
            font-weight: 600;
        }
        .btn-login:hover {
            background: var(--primary-light);
        }
        .alert {
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <i class="fa-solid fa-graduation-cap"></i>
        <h1>Students Management</h1>
        <p>Đăng nhập vào trang quản trị</p>
    </div>
    <div class="login-body">
        <div th:if="${param.error}" class="alert alert-danger">
            <i class="fa-solid fa-circle-exclamation me-2"></i>
            Sai tên đăng nhập hoặc mật khẩu.
        </div>
        <div th:if="${param.denied}" class="alert alert-warning">
            <i class="fa-solid fa-lock me-2"></i>
            Tài khoản của bạn không có quyền truy cập trang quản trị. Chỉ vai trò Admin, Manager, Lecturer mới được đăng nhập.
        </div>
        <div th:if="${param.logout}" class="alert alert-info">
            <i class="fa-solid fa-right-from-bracket me-2"></i>
            Bạn đã đăng xuất.
        </div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                    <input type="text" class="form-control" name="username" placeholder="admin1" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control" name="password" placeholder="••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-login w-100">
                <i class="fa-solid fa-right-to-bracket me-2"></i> Đăng nhập
            </button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
