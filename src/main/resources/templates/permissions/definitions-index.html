<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/dashboard :: layout(
        'Định nghĩa quyền',
        'Danh sách quyền',
        'Quản lý định nghĩa quyền (mã, tên, mô tả)',
        'permissions',
        ~{::content}
      )}">
<body>
<div th:fragment="content">

    <div th:if="${success}" class="alert alert-success">
        <i class="fa-solid fa-circle-check me-1"></i>
        <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger">
        <i class="fa-solid fa-triangle-exclamation me-1"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="d-flex justify-content-between mb-3 flex-wrap gap-2">
                <form class="d-flex gap-2" method="get" th:action="@{/admin/permissions/definitions}">
                    <input class="form-control" name="keyword" placeholder="Tìm theo mã, tên, mô tả..."
                           th:value="${keyword}" style="min-width: 260px;">
                    <button class="btn btn-outline-primary">
                        <i class="fa-solid fa-magnifying-glass"></i> Tìm
                    </button>
                </form>
                <div class="d-flex gap-2">
                    <a class="btn btn-outline-secondary" th:href="@{/admin/permissions}">
                        <i class="fa-solid fa-arrow-left"></i> Quay lại phân quyền
                    </a>
                    <a class="btn btn-primary" th:href="@{/admin/permissions/definitions/new}">
                        <i class="fa-solid fa-plus"></i> Thêm quyền
                    </a>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle table-sm">
                    <thead>
                    <tr>
                        <th>Mã quyền</th>
                        <th>Tên quyền</th>
                        <th>Mô tả</th>
                        <th class="text-end">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${permissions.content}">
                        <td th:text="${p.code()}"></td>
                        <td th:text="${p.name()}"></td>
                        <td th:text="${p.description()}"></td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/permissions/definitions/{id}/edit(id=${p.id})}">
                                <i class="fa-solid fa-pen-to-square"></i> Sửa
                            </a>
                            <form method="post" th:action="@{/admin/permissions/definitions/{id}/delete(id=${p.id})}" style="display:inline;"
                                  onsubmit="return confirm('Bạn có chắc muốn xóa quyền này?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-trash"></i> Xóa</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${permissions.content.isEmpty()}">
                        <td colspan="4" class="text-center text-muted">
                            <i class="fa-solid fa-box-open"></i> Chưa có quyền nào. Thêm quyền để có thể gán cho vai trò.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${permissions.totalPages > 1}" class="mt-3">
                <ul class="pagination justify-content-center mb-0">
                    <li class="page-item" th:classappend="${permissions.first} ? 'disabled' : ''">
                        <a class="page-link" th:href="@{/admin/permissions/definitions(page=${permissions.number - 1}, keyword=${keyword})}">Trước</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, permissions.totalPages - 1)}" th:classappend="${i == permissions.number} ? 'active' : ''">
                        <a class="page-link" th:text="${i + 1}" th:href="@{/admin/permissions/definitions(page=${i}, keyword=${keyword})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${permissions.last} ? 'disabled' : ''">
                        <a class="page-link" th:href="@{/admin/permissions/definitions(page=${permissions.number + 1}, keyword=${keyword})}">Sau</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</div>
</body>
</html>
