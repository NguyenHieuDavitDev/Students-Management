<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/dashboard :: layout(
        'Thông báo',
        'Thông báo',
        ${mode == 'create' ? 'Tạo thông báo' : 'Chỉnh sửa thông báo'},
        'notifications',
        ~{::content}
      )}">
<body>
<div th:fragment="content">

    <div class="card border-0 shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div>
                <i class="fa-solid fa-bell me-2 text-primary"></i>
                <span th:text="${mode == 'create' ? 'Tạo thông báo' : 'Chỉnh sửa thông báo'}">Tạo</span>
            </div>
            <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/notifications}">
                <i class="fa-solid fa-arrow-left me-1"></i>Quay lại
            </a>
        </div>

        <div class="card-body">
            <form
                    th:object="${notificationRequest}"
                    method="post"
                    th:action="${mode == 'create' ? '/admin/notifications' : '/admin/notifications/' + notificationId}"
            >
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="field-label">Người nhận <span class="required-star">*</span></label>
                        <select class="form-select"
                                th:field="*{recipientUserId}"
                                th:classappend="${#fields.hasErrors('recipientUserId')} ? ' is-invalid'">
                            <option value="">-- Chọn người nhận --</option>
                            <option th:each="u : ${users}"
                                    th:value="${u.id}"
                                    th:text="${u.username + ' (' + u.email + ')'}"></option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('recipientUserId')}"
                             th:errors="*{recipientUserId}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="field-label">Loại thông báo <span class="required-star">*</span></label>
                        <select class="form-select"
                                th:field="*{category}"
                                th:classappend="${#fields.hasErrors('category')} ? ' is-invalid'">
                            <option value="">-- Chọn loại --</option>
                            <option th:each="c : ${categories}" th:value="${c.name()}" th:text="${c.getLabel()}"></option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('category')}"
                             th:errors="*{category}"></div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="field-label">Tiêu đề <span class="required-star">*</span></label>
                    <input type="text" class="form-control"
                           th:field="*{title}"
                           th:classappend="${#fields.hasErrors('title')} ? ' is-invalid'"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                </div>

                <div class="mb-3">
                    <label class="field-label">Nội dung <span class="required-star">*</span></label>
                    <textarea class="form-control"
                              rows="4"
                              th:field="*{content}"
                              th:classappend="${#fields.hasErrors('content')} ? ' is-invalid'"></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="field-label">Gửi lúc (tùy chọn)</label>
                        <input type="datetime-local" class="form-control" th:field="*{scheduledAt}"
                               th:classappend="${#fields.hasErrors('scheduledAt')} ? ' is-invalid'"/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('scheduledAt')}" th:errors="*{scheduledAt}"></div>
                    </div>
                    <div class="col-md-6 d-flex align-items-end">
                        <div class="form-text small text-muted">
                            Nếu để trống, hệ thống sẽ dùng thời gian tạo thông báo.
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2 justify-content-end pt-2 border-top">
                    <button type="submit" class="btn btn-warning px-4 text-dark">
                        <i th:class="${mode == 'create' ? 'fa-solid fa-plus me-1' : 'fa-solid fa-floppy-disk me-1'}"></i>
                        <span th:text="${mode == 'create' ? 'Tạo thông báo' : 'Lưu thay đổi'}"></span>
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>
</body>
</html>
