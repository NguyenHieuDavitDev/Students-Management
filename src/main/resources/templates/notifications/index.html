<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/user-layout :: layout(
        'Thông báo',
        ~{::content}
      )}">
<body>
<div th:fragment="content">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm">
        <i class="fa-solid fa-circle-check me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
                <div>
                    <div class="h4 mb-1"><i class="fa-solid fa-bell me-2 text-primary"></i>Thông báo hệ thống</div>
                    <div class="text-muted small">Danh sách thông báo gửi tới bạn</div>
                </div>

                <div class="d-flex align-items-center gap-2">
                    <a th:href="@{/notifications(unreadOnly=${false}, category=${categoryStr}, page=${0}, size=${size})}"
                       class="btn btn-outline-secondary btn-sm">
                        Tất cả
                    </a>
                    <a th:href="@{/notifications(unreadOnly=${true}, category=${categoryStr}, page=${0}, size=${size})}"
                       class="btn btn-outline-primary btn-sm fw-semibold">
                        Chưa đọc
                    </a>
                </div>
            </div>

            <form class="row g-2 align-items-end" method="get" th:action="@{/notifications}">
                <div class="col-12 col-md-5">
                    <label class="form-label">Loại thông báo</label>
                    <select class="form-select" name="category">
                        <option value="" th:selected="${category == null}">Tất cả</option>
                        <option th:each="c : ${categories}"
                                th:value="${c.name()}"
                                th:selected="${category != null and c == category}"
                                th:text="${c.getLabel()}">Loại</option>
                    </select>
                </div>
                <div class="col-12 col-md-4">
                    <div class="form-check mt-1">
                        <input class="form-check-input" type="checkbox" id="unreadOnly" name="unreadOnly"
                               th:checked="${unreadOnly}">
                        <label class="form-check-label" for="unreadOnly">Chỉ hiện chưa đọc</label>
                    </div>
                </div>
                <div class="col-12 col-md-3 text-md-end">
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-filter me-1"></i>Lọc
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                    <tr>
                        <th style="width: 170px;">Loại</th>
                        <th>Tiêu đề</th>
                        <th>Nội dung</th>
                        <th style="width: 170px;">Thời gian</th>
                        <th style="width: 120px;">Trạng thái</th>
                        <th style="width: 150px;">Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="n : ${items}">
                        <td>
                            <span class="badge bg-primary" th:text="${n.categoryLabel != null ? n.categoryLabel : n.category}">Loại</span>
                        </td>
                        <td>
                            <div class="fw-semibold" th:text="${n.title}">Tiêu đề</div>
                        </td>
                        <td>
                            <div class="text-muted small" th:text="${#strings.length(n.content) > 120 ? #strings.substring(n.content,0,120) + '...' : n.content}">
                                Nội dung
                            </div>
                        </td>
                        <td>
                            <div class="small text-muted" th:text="${n.createdAt}">Thời gian</div>
                            <div class="small text-muted" th:if="${n.scheduledAt != null}"
                                 th:text="| (Gửi lúc ${n.scheduledAt}) |"></div>
                        </td>
                        <td>
                            <span th:if="${n.read}" class="badge bg-success">Đã đọc</span>
                            <span th:unless="${n.read}" class="badge bg-danger">Chưa đọc</span>
                        </td>
                        <td>
                            <form th:if="${!n.read}" method="post" th:action="@{/notifications/{id}/read(id=${n.id})}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-sm btn-outline-primary w-100">
                                    <i class="fa-solid fa-eye me-1"></i>Đã xem
                                </button>
                            </form>
                            <span th:if="${n.read}" class="text-muted small">-</span>
                        </td>
                    </tr>
                    <tr th:if="${items == null or #lists.isEmpty(items)}">
                        <td colspan="6" class="text-center py-5 text-muted">
                            <i class="fa-solid fa-bell-slash fa-2x d-block mb-2 opacity-40"></i>
                            Hiện chưa có thông báo nào.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="d-flex align-items-center justify-content-between mt-3 flex-wrap gap-2">
        <small class="text-muted">
            Hiển thị <strong th:text="${page.numberOfElements}">0</strong> / <strong th:text="${page.totalElements}">0</strong> thông báo
        </small>

        <nav th:if="${page.totalPages > 1}" aria-label="Pagination">
            <ul class="pagination pagination-sm mb-0">
                <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/notifications(page=${page.number - 1}, size=${size}, unreadOnly=${unreadOnly}, category=${categoryStr})}"
                       aria-label="Previous">
                        <i class="fa-solid fa-chevron-left"></i>
                    </a>
                </li>
                <li th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                    class="page-item"
                    th:classappend="${i == page.number} ? 'active'">
                    <a class="page-link"
                       th:text="${i + 1}"
                       th:href="@{/notifications(page=${i}, size=${size}, unreadOnly=${unreadOnly}, category=${categoryStr})}"></a>
                </li>
                <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/notifications(page=${page.number + 1}, size=${size}, unreadOnly=${unreadOnly}, category=${categoryStr})}"
                       aria-label="Next">
                        <i class="fa-solid fa-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</div>
</body>
</html>
