<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng nhập quản trị - Students Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root { --primary: #343a40; --primary-light: #495057; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1d21 0%, #2c3e50 50%, #34495e 100%);
            font-family: "Segoe UI", system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,.3);
            overflow: hidden;
            max-width: 380px;
            width: 100%;
        }
        .login-header {
            background: var(--primary);
            color: #fff;
            padding: 1.5rem;
            text-align: center;
        }
        .login-header i { font-size: 2.25rem; margin-bottom: 0.5rem; opacity: 0.95; }
        .login-header h1 { font-size: 1.25rem; font-weight: 600; margin: 0; }
        .login-header p { font-size: 0.8rem; opacity: 0.85; margin: 0.25rem 0 0; }
        .login-body { padding: 1.75rem; }
        .btn-login { background: var(--primary); border: none; font-weight: 600; }
        .btn-login:hover { background: var(--primary-light); }
        .login-footer { padding: 1rem 1.75rem; border-top: 1px solid #dee2e6; text-align: center; }
        .login-footer a { color: #0d6efd; text-decoration: none; font-size: 0.9rem; }
        .login-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <i class="fa-solid fa-shield-halved"></i>
        <h1>Đăng nhập quản trị</h1>
        <p>Dashboard quản lý hệ thống</p>
    </div>
    <div class="login-body">
        <div th:if="${param.error}" class="alert alert-danger py-2">
            <i class="fa-solid fa-circle-exclamation me-2"></i>Sai tên đăng nhập hoặc mật khẩu.
        </div>
        <div th:if="${param.denied}" class="alert alert-warning py-2">
            <i class="fa-solid fa-lock me-2"></i>Tài khoản không có quyền truy cập trang quản trị.
        </div>
        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                    <input type="text" class="form-control" name="username" placeholder="Tên đăng nhập" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control" name="password" placeholder="Mật khẩu" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-login w-100">
                <i class="fa-solid fa-right-to-bracket me-2"></i> Đăng nhập
            </button>
        </form>
    </div>
    <div class="login-footer">
        <a th:href="@{/}"><i class="fa-solid fa-home me-1"></i> Trang chủ / Đăng nhập sinh viên</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
