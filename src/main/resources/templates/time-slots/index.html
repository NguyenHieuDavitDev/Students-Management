<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/dashboard :: layout(
        'Khung giờ chuẩn',
        'Danh sách khung giờ chuẩn',
        'Quản lý khung giờ',
        'time-slots',
        ~{::content}
      )}">
<body>
<div th:fragment="content">

    <div th:if="${success}" class="alert alert-success">
        <i class="fa-solid fa-circle-check me-1"></i>
        <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger">
        <i class="fa-solid fa-triangle-exclamation me-1"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card">
        <div class="card-body">

            <div class="d-flex justify-content-between mb-3 flex-wrap gap-2">

                <form class="d-flex gap-2" method="get" th:action="@{/admin/time-slots}">
                    <input class="form-control"
                           name="keyword"
                           placeholder="Tìm theo mã khung giờ"
                           th:value="${keyword}"
                           style="min-width: 200px;">
                    <button class="btn btn-outline-primary">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        Tìm
                    </button>
                </form>

                <div class="d-flex gap-2 flex-wrap">
                    <form class="d-flex gap-2"
                          th:action="@{/admin/time-slots/import}"
                          method="post"
                          enctype="multipart/form-data">
                        <input type="file"
                               name="file"
                               class="form-control form-control-sm"
                               accept=".xlsx,.xls"
                               required>
                        <button class="btn btn-outline-success btn-sm" type="submit">
                            <i class="fa-solid fa-file-import"></i>
                            Import
                        </button>
                    </form>
                    <a class="btn btn-outline-success" th:href="@{/admin/time-slots/export}">
                        <i class="fa-solid fa-file-excel"></i>
                        Export
                    </a>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/time-slots/print}" target="_blank">
                        <i class="fa-solid fa-print"></i>
                        In
                    </a>
                    <a class="btn btn-primary" th:href="@{/admin/time-slots/new}">
                        <i class="fa-solid fa-plus"></i>
                        Thêm mới
                    </a>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                    <tr>
                        <th>Mã khung giờ</th>
                        <th class="text-center">Tiết bắt đầu</th>
                        <th class="text-center">Tiết kết thúc</th>
                        <th class="text-center">Giờ bắt đầu</th>
                        <th class="text-center">Giờ kết thúc</th>
                        <th class="text-center">Trạng thái</th>
                        <th class="text-end">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="ts : ${timeSlots.content}">
                        <td th:text="${ts.slotCode}"></td>
                        <td class="text-center" th:text="${ts.periodStart}"></td>
                        <td class="text-center" th:text="${ts.periodEnd}"></td>
                        <td class="text-center" th:text="${ts.startTime != null ? #temporals.format(ts.startTime, 'HH:mm') : ''}"></td>
                        <td class="text-center" th:text="${ts.endTime != null ? #temporals.format(ts.endTime, 'HH:mm') : ''}"></td>
                        <td class="text-center">
                            <span class="badge" th:classappend="${ts.isActive} ? 'bg-success' : 'bg-secondary'"
                                  th:text="${ts.isActive} ? 'Đang dùng' : 'Tắt'"></span>
                        </td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-primary"
                               th:href="@{/admin/time-slots/{id}/edit(id=${ts.id})}">
                                <i class="fa-solid fa-pen-to-square"></i>
                                Sửa
                            </a>
                            <form method="post"
                                  th:action="@{/admin/time-slots/{id}/delete(id=${ts.id})}"
                                  style="display: inline;"
                                  onsubmit="return confirm('Bạn có chắc chắn muốn xóa khung giờ này?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="fa-solid fa-trash"></i>
                                    Xóa
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${timeSlots.content.isEmpty()}">
                        <td colspan="7" class="text-center text-muted">
                            <i class="fa-solid fa-box-open"></i>
                            Không có dữ liệu khung giờ
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${timeSlots.totalPages > 1}" class="mt-3">
                <ul class="pagination justify-content-center mb-0">
                    <li class="page-item" th:classappend="${timeSlots.first} ? 'disabled' : ''">
                        <a class="page-link"
                           th:href="@{/admin/time-slots(page=${timeSlots.number - 1}, keyword=${keyword})}">Trước</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, timeSlots.totalPages - 1)}"
                        th:classappend="${i == timeSlots.number} ? 'active' : ''">
                        <a class="page-link" th:text="${i + 1}"
                           th:href="@{/admin/time-slots(page=${i}, keyword=${keyword})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${timeSlots.last} ? 'disabled' : ''">
                        <a class="page-link"
                           th:href="@{/admin/time-slots(page=${timeSlots.number + 1}, keyword=${keyword})}">Sau</a>
                    </li>
                </ul>
            </nav>

        </div>
    </div>

</div>
</body>
</html>
