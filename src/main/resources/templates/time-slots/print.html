<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>In danh sách khung giờ chuẩn</title>
    <style>
        @page { size: A4; margin: 20mm; }
        body { font-family: "Segoe UI", Arial; font-size: 13px; }
        .header { text-align: center; margin-bottom: 16px; }
        .header h2 { margin: 0; font-size: 20px; text-transform: uppercase; }
        .header .sub { font-size: 12px; margin-top: 4px; }
        .info { margin-bottom: 10px; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #000; padding: 6px 8px; }
        th { background: #f2f2f2; text-align: center; font-weight: 600; }
        td { vertical-align: middle; }
        .text-center { text-align: center; }
        .footer { margin-top: 20px; text-align: right; }
        .signature { text-align: center; width: 200px; }
        .signature p { margin: 0; }
    </style>
</head>
<body onload="window.print()">

<div class="header">
    <h2>DANH SÁCH KHUNG GIỜ CHUẨN</h2>
    <div class="sub">
        Ngày in: <span th:text="${#dates.format(#dates.createNow(), 'dd/MM/yyyy')}"></span>
    </div>
</div>

<div class="info">
    Tổng số khung giờ: <strong th:text="${timeSlots.size()}"></strong>
</div>

<table>
    <thead>
    <tr>
        <th style="width: 40px">STT</th>
        <th style="width: 100px">Mã khung giờ</th>
        <th style="width: 80px">Tiết bắt đầu</th>
        <th style="width: 80px">Tiết kết thúc</th>
        <th style="width: 90px">Giờ bắt đầu</th>
        <th style="width: 90px">Giờ kết thúc</th>
        <th style="width: 100px">Buổi (lịch)</th>
        <th style="width: 90px">Trạng thái</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="ts, i : ${timeSlots}">
        <td class="text-center" th:text="${i.index + 1}"></td>
        <td th:text="${ts.slotCode}"></td>
        <td class="text-center" th:text="${ts.periodStart}"></td>
        <td class="text-center" th:text="${ts.periodEnd}"></td>
        <td class="text-center" th:text="${ts.startTime != null ? #temporals.format(ts.startTime, 'HH:mm') : ''}"></td>
        <td class="text-center" th:text="${ts.endTime != null ? #temporals.format(ts.endTime, 'HH:mm') : ''}"></td>
        <td class="text-center" th:text="${ts.dayPartLabel}"></td>
        <td class="text-center" th:text="${ts.isActive} ? 'Đang dùng' : 'Tắt'"></td>
    </tr>
    <tr th:if="${timeSlots.isEmpty()}">
        <td colspan="8" class="text-center">Không có dữ liệu khung giờ</td>
    </tr>
    </tbody>
</table>

<div class="footer">
    <div class="signature" style="margin-left: auto;">
        <p><strong>Người lập danh sách</strong></p>
        <p style="margin-top: 40px;">(Ký, ghi rõ họ tên)</p>
    </div>
</div>

</body>
</html>
