<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đặt lại mật khẩu - Students Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root { --primary: #343a40; --primary-light: #495057; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1d21 0%, #343a40 50%, #495057 100%);
            font-family: "Segoe UI", system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .auth-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,.25);
            max-width: 420px;
            width: 100%;
        }
        .auth-header {
            background: var(--primary);
            color: #fff;
            padding: 1.5rem;
            text-align: center;
            border-radius: 16px 16px 0 0;
        }
        .auth-header i { font-size: 2rem; }
        .auth-header h1 { font-size: 1.25rem; font-weight: 600; margin: 0.5rem 0 0; }
        .auth-body { padding: 1.75rem; }
        .btn-submit { background: var(--primary); border: none; font-weight: 600; }
        .btn-submit:hover { background: var(--primary-light); }
        .auth-footer { padding: 0 1.75rem 1.75rem; text-align: center; }
        .auth-footer a { color: #0d6efd; text-decoration: none; }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="auth-header">
        <i class="fa-solid fa-lock"></i>
        <h1>Đặt lại mật khẩu</h1>
    </div>
    <div class="auth-body">
        <div th:if="${invalidToken}" class="alert alert-danger">
            Link không hợp lệ hoặc đã hết hạn. Vui lòng <a th:href="@{/forgot-password}">yêu cầu link mới</a>.
        </div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <form th:if="${token != null and !invalidToken}" th:action="@{/reset-password}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="token" th:value="${token}">
            <div class="mb-3">
                <label class="form-label">Mật khẩu mới <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control" name="newPassword" placeholder="Tối thiểu 6 ký tự" required minlength="6">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control" name="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-submit w-100">
                <i class="fa-solid fa-check me-2"></i> Đặt lại mật khẩu
            </button>
        </form>
    </div>
    <div class="auth-footer">
        <a th:href="@{/login}"><i class="fa-solid fa-arrow-left me-1"></i> Quay lại đăng nhập</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
