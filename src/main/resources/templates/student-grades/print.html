<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>In danh sách điểm sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <style>
        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
        }
        .print-header { border-bottom: 2px solid #333; padding-bottom: 12px; margin-bottom: 16px; }
        .print-header h4 { margin: 0; font-weight: 600; }
        .print-header .meta { font-size: 0.85rem; color: #666; margin-top: 4px; }
        .print-table { font-size: 0.85rem; }
        .print-table thead th { background: #f0f0f0 !important; font-weight: 600; padding: 8px 6px; border: 1px solid #dee2e6; }
        .print-table tbody td { padding: 6px; border: 1px solid #dee2e6; }
        .print-table .score-cell { text-align: center; font-weight: 600; }
    </style>
</head>
<body class="p-4">
<div class="container-fluid">
    <div class="no-print mb-3">
        <button onclick="window.print()" class="btn btn-primary btn-sm">
            <i class="fa-solid fa-print me-1"></i>In
        </button>
        <button onclick="window.close()" class="btn btn-outline-secondary btn-sm" th:if="${false}">Đóng</button>
    </div>
    <div class="print-header">
        <h4>DANH SÁCH ĐIỂM SINH VIÊN</h4>
        <div class="meta" th:if="${courseClassId != null}">
            Lọc theo lớp học phần đã chọn
        </div>
        <div class="meta">Ngày in: <span th:text="${#temporals.format(#temporals.createNow(), 'dd/MM/yyyy HH:mm')}"></span></div>
    </div>
    <table class="table table-bordered print-table">
        <thead>
        <tr>
            <th style="width:40px">STT</th>
            <th>MSSV</th>
            <th>Họ tên</th>
            <th>Lớp học phần</th>
            <th>Học phần</th>
            <th>Thành phần điểm</th>
            <th class="text-center" style="width:70px">Điểm</th>
            <th>GV nhập điểm</th>
            <th>Thời gian</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="g, stat : ${items}">
            <td th:text="${stat.count}"></td>
            <td th:text="${g.studentCode}"></td>
            <td th:text="${g.studentName}"></td>
            <td th:text="${g.classCode}"></td>
            <td th:text="${g.courseName}"></td>
            <td th:text="${g.componentName}"></td>
            <td class="score-cell" th:text="${g.score != null ? #numbers.formatDecimal(g.score, 1, 2) : '-'}"></td>
            <td th:text="${g.gradedByLecturerName ?: '-'}"></td>
            <td th:text="${g.gradedAt != null ? #temporals.format(g.gradedAt, 'dd/MM/yyyy HH:mm') : '-'}"></td>
        </tr>
        <tr th:if="${items.isEmpty()}">
            <td colspan="9" class="text-center text-muted py-4">Chưa có dữ liệu</td>
        </tr>
        </tbody>
    </table>
</div>
<script>window.onload = function() { window.print(); }</script>
</body>
</html>
