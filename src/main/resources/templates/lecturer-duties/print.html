<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>In danh sách chức vụ giảng viên</title>
    <style>
        body { font-family: Arial, sans-serif; }
        table { width:100%; border-collapse: collapse; margin-top:20px; }
        th, td { border:1px solid #000; padding:6px; }
        th { background:#f2f2f2; }
        h3 { text-align:center; }
    </style>
</head>
<body onload="window.print()">

<h3>DANH SÁCH CHỨC VỤ GIẢNG VIÊN</h3>

<table>
    <thead>
    <tr>
        <th>STT</th>
        <th>Mã chức vụ</th>
        <th>Tên chức vụ</th>
        <th>Mô tả</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="d, i : ${duties}">
        <td th:text="${i.index + 1}"></td>
        <td th:text="${d.dutyCode}"></td>
        <td th:text="${d.dutyName}"></td>
        <td th:text="${d.description != null ? d.description : '-'}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
