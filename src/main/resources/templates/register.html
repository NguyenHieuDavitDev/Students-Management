<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng ký - Students Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root { --primary: #343a40; --primary-light: #495057; --accent: #0d6efd; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1d21 0%, #343a40 50%, #495057 100%);
            font-family: "Segoe UI", system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .auth-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,.25);
            overflow: hidden;
            max-width: 420px;
            width: 100%;
        }
        .auth-header {
            background: var(--primary);
            color: #fff;
            padding: 1.5rem;
            text-align: center;
        }
        .auth-header i { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.95; }
        .auth-header h1 { font-size: 1.25rem; font-weight: 600; margin: 0; }
        .auth-header p { font-size: 0.8rem; opacity: 0.85; margin: 0.25rem 0 0; }
        .auth-body { padding: 1.75rem; }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25); }
        .btn-submit { background: var(--primary); border: none; font-weight: 600; }
        .btn-submit:hover { background: var(--primary-light); }
        .auth-footer { padding: 0 1.75rem 1.75rem; text-align: center; }
        .auth-footer a { color: var(--accent); text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="auth-header">
        <i class="fa-solid fa-user-plus"></i>
        <h1>Đăng ký tài khoản</h1>
        <p>Dành cho sinh viên</p>
    </div>
    <div class="auth-body">
        <div th:if="${globalError}" class="alert alert-danger">
            <i class="fa-solid fa-circle-exclamation me-2"></i>
            <span th:text="${globalError}">Lỗi</span>
        </div>
        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="mb-3">
                <label class="form-label">Tên đăng nhập <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                    <input type="text" class="form-control" th:field="*{username}" placeholder="Từ 3–100 ký tự" required>
                </div>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Email <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" class="form-control" th:field="*{email}" placeholder="email@example.com" required>
                </div>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control" th:field="*{password}" placeholder="Tối thiểu 6 ký tự" required>
                </div>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>
            <div class="mb-4">
                <label class="form-label">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control" th:field="*{confirmPassword}" placeholder="Nhập lại mật khẩu" required>
                </div>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            </div>
            <button type="submit" class="btn btn-primary btn-submit w-100">
                <i class="fa-solid fa-user-plus me-2"></i> Đăng ký
            </button>
        </form>
    </div>
    <div class="auth-footer">
        Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
