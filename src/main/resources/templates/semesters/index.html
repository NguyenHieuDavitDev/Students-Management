<!doctype html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/dashboard :: layout(
        'Học kỳ',
        'Danh sách học kỳ',
        'Quản lý học kỳ',
        'semesters',
        ~{::content}
      )}">
<body>
<div th:fragment="content">

    <div th:if="${success}" class="alert alert-success">
        <i class="fa-solid fa-circle-check me-1"></i>
        <span th:text="${success}"></span>
    </div>

    <div th:if="${error}" class="alert alert-danger">
        <i class="fa-solid fa-triangle-exclamation me-1"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card">
        <div class="card-body">

            <div class="d-flex justify-content-between mb-3">
                <form class="d-flex gap-2" method="get" th:action="@{/admin/semesters}">
                    <input class="form-control"
                           name="keyword"
                           placeholder="Tìm theo mã hoặc tên học kỳ"
                           th:value="${keyword}">
                    <input type="hidden" name="size" th:value="${size}">
                    <button class="btn btn-outline-primary">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        Tìm
                    </button>
                </form>

                <div class="d-flex gap-2">

                    <a class="btn btn-outline-success"
                       th:href="@{/admin/semesters/export}">
                        <i class="fa-solid fa-file-excel"></i>
                        Export
                    </a>

                    <a class="btn btn-outline-secondary"
                       th:href="@{/admin/semesters/print}"
                       target="_blank">
                        <i class="fa-solid fa-print"></i>
                        In
                    </a>

                    <a class="btn btn-primary"
                       th:href="@{/admin/semesters/new}">
                        <i class="fa-solid fa-plus"></i>
                        Thêm mới
                    </a>
                </div>
            </div>

            <form method="post"
                  enctype="multipart/form-data"
                  th:action="@{/admin/semesters/import}"
                  class="mb-3 d-flex gap-2">

                <input type="file"
                       name="file"
                       class="form-control"
                       accept=".xlsx,.xls"
                       required>

                <button class="btn btn-outline-primary">
                    <i class="fa-solid fa-upload"></i>
                    Import
                </button>
            </form>

            <table class="table table-hover">
                <thead>
                <tr>
                    <th>Mã</th>
                    <th>Tên học kỳ</th>
                    <th>Năm học</th>
                    <th class="text-center">Kỳ</th>
                    <th class="text-center">Đăng ký</th>
                    <th class="text-center">Thời gian</th>
                    <th class="text-center">Trạng thái</th>
                    <th class="text-end">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${semesters.content}">
                    <td th:text="${s.code}"></td>
                    <td th:text="${s.name}"></td>
                    <td th:text="${s.academicYear}"></td>
                    <td class="text-center" th:text="${s.term}"></td>
                    <td class="text-center">
                        <span th:text="${s.registrationStart != null ? #temporals.format(s.registrationStart, 'dd/MM/yyyy') : ''}"></span>
                        <span th:if="${s.registrationStart != null and s.registrationEnd != null}"> - </span>
                        <span th:text="${s.registrationEnd != null ? #temporals.format(s.registrationEnd, 'dd/MM/yyyy') : ''}"></span>
                    </td>
                    <td class="text-center">
                        <span th:text="${s.startDate != null ? #temporals.format(s.startDate, 'dd/MM/yyyy') : ''}"></span>
                        <span th:if="${s.startDate != null and s.endDate != null}"> - </span>
                        <span th:text="${s.endDate != null ? #temporals.format(s.endDate, 'dd/MM/yyyy') : ''}"></span>
                    </td>
                    <td class="text-center">
                        <span class="badge text-bg-secondary"
                              th:if="${s.status.name() == 'UPCOMING'}">UPCOMING</span>
                        <span class="badge text-bg-success"
                              th:if="${s.status.name() == 'OPEN'}">OPEN</span>
                        <span class="badge text-bg-dark"
                              th:if="${s.status.name() == 'CLOSED'}">CLOSED</span>
                    </td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary"
                           th:href="@{/admin/semesters/{id}/edit(id=${s.id})}">
                            <i class="fa-solid fa-pen-to-square"></i>
                            Sửa
                        </a>
                        <form method="post"
                              th:action="@{/admin/semesters/{id}/delete(id=${s.id})}"
                              style="display:inline;"
                              onsubmit="return confirm('Bạn có chắc chắn muốn xóa học kỳ này?');">
                            <button class="btn btn-sm btn-outline-danger">
                                <i class="fa-solid fa-trash"></i>
                                Xóa
                            </button>
                        </form>
                    </td>
                </tr>

                <tr th:if="${semesters.content.isEmpty()}">
                    <td colspan="8" class="text-center text-muted">
                        <i class="fa-solid fa-box-open"></i>
                        Không có dữ liệu học kỳ
                    </td>
                </tr>
                </tbody>
            </table>

            <nav th:if="${semesters.totalPages > 1}">
                <ul class="pagination justify-content-center">
                    <li class="page-item"
                        th:classappend="${semesters.first}? ' disabled'">
                        <a class="page-link"
                           th:href="@{/admin/semesters(page=${semesters.number-1}, size=${size}, keyword=${keyword})}">
                            Trước
                        </a>
                    </li>

                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, semesters.totalPages-1)}"
                        th:classappend="${i==semesters.number}? ' active'">
                        <a class="page-link"
                           th:text="${i+1}"
                           th:href="@{/admin/semesters(page=${i}, size=${size}, keyword=${keyword})}">
                        </a>
                    </li>

                    <li class="page-item"
                        th:classappend="${semesters.last}? ' disabled'">
                        <a class="page-link"
                           th:href="@{/admin/semesters(page=${semesters.number+1}, size=${size}, keyword=${keyword})}">
                            Sau
                        </a>
                    </li>
                </ul>
            </nav>

        </div>
    </div>

</div>
</body>
</html>
