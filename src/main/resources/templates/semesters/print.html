<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>In danh sách học kỳ</title>

    <style>
        @page { size: A4; margin: 20mm; }
        body { font-family: "Segoe UI", Arial, sans-serif; font-size: 13px; color: #000; }
        .header { text-align: center; margin-bottom: 16px; }
        .header h2 { margin: 0; font-size: 20px; text-transform: uppercase; }
        .header .sub { font-size: 12px; margin-top: 4px; }
        .info { margin-bottom: 10px; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #000; padding: 6px 8px; }
        th { background: #f2f2f2; text-align: center; font-weight: 600; }
        td { vertical-align: middle; }
        .text-center { text-align: center; }
        .footer { margin-top: 20px; display: flex; justify-content: space-between; font-size: 12px; }
        .signature { text-align: center; width: 200px; }
        .signature p { margin: 0; }
    </style>
</head>

<body onload="window.print()">

<div class="header">
    <h2>DANH SÁCH HỌC KỲ</h2>
    <div class="sub">
        Ngày in:
        <span th:text="${#dates.format(#dates.createNow(), 'dd/MM/yyyy')}"></span>
    </div>
</div>

<div class="info">
    Tổng số học kỳ:
    <strong th:text="${semesters.size()}"></strong>
</div>

<table>
    <thead>
    <tr>
        <th style="width:40px">STT</th>
        <th style="width:80px">Mã</th>
        <th>Tên học kỳ</th>
        <th style="width:90px">Năm học</th>
        <th style="width:50px">Kỳ</th>
        <th style="width:120px">Đăng ký</th>
        <th style="width:120px">Thời gian</th>
        <th style="width:80px">Trạng thái</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="s, i : ${semesters}">
        <td class="text-center" th:text="${i.index + 1}"></td>
        <td th:text="${s.code}"></td>
        <td th:text="${s.name}"></td>
        <td class="text-center" th:text="${s.academicYear}"></td>
        <td class="text-center" th:text="${s.term}"></td>
        <td class="text-center">
            <span th:text="${s.registrationStart != null ? #temporals.format(s.registrationStart, 'dd/MM/yyyy') : ''}"></span>
            <span th:if="${s.registrationStart != null and s.registrationEnd != null}"> - </span>
            <span th:text="${s.registrationEnd != null ? #temporals.format(s.registrationEnd, 'dd/MM/yyyy') : ''}"></span>
        </td>
        <td class="text-center">
            <span th:text="${s.startDate != null ? #temporals.format(s.startDate, 'dd/MM/yyyy') : ''}"></span>
            <span th:if="${s.startDate != null and s.endDate != null}"> - </span>
            <span th:text="${s.endDate != null ? #temporals.format(s.endDate, 'dd/MM/yyyy') : ''}"></span>
        </td>
        <td class="text-center" th:text="${s.status}"></td>
    </tr>

    <tr th:if="${semesters.isEmpty()}">
        <td colspan="8" class="text-center">
            Không có dữ liệu học kỳ
        </td>
    </tr>
    </tbody>
</table>

<div class="footer">
    <div></div>
    <div class="signature">
        <p><strong>Người lập danh sách</strong></p>
        <p style="margin-top: 40px;">(Ký, ghi rõ họ tên)</p>
    </div>
</div>

</body>
</html>
