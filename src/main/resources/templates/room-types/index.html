<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/dashboard :: layout(
        'Loại phòng',
        'Danh sách loại phòng',
        'Quản lý loại phòng',
        'room-types',
        ~{::content}
      )}">
<body>
<div th:fragment="content">

    <!-- ALERT -->
    <div th:if="${success}" class="alert alert-success">
        <i class="fa-solid fa-circle-check me-1"></i>
        <span th:text="${success}"></span>
    </div>

    <div th:if="${error}" class="alert alert-danger">
        <i class="fa-solid fa-triangle-exclamation me-1"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card">
        <div class="card-body">

            <div class="d-flex justify-content-between mb-3">

                <!-- SEARCH -->
                <form class="d-flex gap-2" method="get" th:action="@{/admin/room-types}">
                    <input class="form-control"
                           name="keyword"
                           placeholder="Tìm theo mã hoặc tên loại phòng"
                           th:value="${keyword}">
                    <button class="btn btn-outline-primary">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        Tìm
                    </button>
                </form>

                <!-- ACTION BUTTONS -->
                <div class="d-flex gap-2">

                    <form class="d-flex gap-2"
                          th:action="@{/admin/room-types/import}"
                          method="post"
                          enctype="multipart/form-data">
                        <input type="file"
                               name="file"
                               class="form-control form-control-sm"
                               accept=".xlsx,.xls"
                               required>
                        <button class="btn btn-outline-success btn-sm" type="submit">
                            <i class="fa-solid fa-file-import"></i>
                            Import
                        </button>
                    </form>

                    <a class="btn btn-outline-success"
                       th:href="@{/admin/room-types/export}">
                        <i class="fa-solid fa-file-excel"></i>
                        Export
                    </a>

                    <a class="btn btn-outline-secondary"
                       th:href="@{/admin/room-types/print}"
                       target="_blank">
                        <i class="fa-solid fa-print"></i>
                        In
                    </a>

                    <a class="btn btn-primary"
                       th:href="@{/admin/room-types/new}">
                        <i class="fa-solid fa-plus"></i>
                        Thêm mới
                    </a>
                </div>
            </div>

            <!-- TABLE -->
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>Mã loại</th>
                    <th>Tên loại phòng</th>
                    <th>Sức chứa mặc định</th>
                    <th>Mô tả</th>
                    <th class="text-end">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="rt : ${roomTypes.content}">
                    <td th:text="${rt.roomTypeCode}"></td>
                    <td th:text="${rt.roomTypeName}"></td>
                    <td th:text="${rt.maxCapacity}"></td>
                    <td th:text="${rt.description}"></td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary"
                           th:href="@{/admin/room-types/{id}/edit(id=${rt.roomTypeId})}">
                            <i class="fa-solid fa-pen-to-square"></i>
                            Sửa
                        </a>
                        <form method="post"
                              th:action="@{/admin/room-types/{id}/delete(id=${rt.roomTypeId})}"
                              style="display: inline;"
                              onsubmit="return confirm('Bạn có chắc chắn muốn xóa loại phòng này?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="fa-solid fa-trash"></i>
                                Xóa
                            </button>
                        </form>
                    </td>
                </tr>

                <tr th:if="${roomTypes.content.isEmpty()}">
                    <td colspan="5" class="text-center text-muted">
                        <i class="fa-solid fa-box-open"></i>
                        Không có dữ liệu loại phòng
                    </td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>
</body>
</html>
