<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/dashboard :: layout(
        'Cấu hình hệ thống',
        'Cấu hình hệ thống',
        'Thông tin đơn vị, liên hệ và hiển thị',
        'settings',
        ~{::content}
      )}">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Cấu hình hệ thống</title>
</head>
<body>
<div th:fragment="content">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fa-solid fa-circle-check me-2"></i><span th:text="${success}">Đã lưu</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card">
        <div class="card-header d-flex align-items-center gap-2">
            <i class="fa-solid fa-sliders text-primary"></i>
            <span>Cấu hình chung</span>
        </div>
        <div class="card-body">
            <p class="text-muted small mb-4">
                Thông tin đơn vị dùng trên giao diện quản trị (tên sidebar, footer).
                Chỉ tài khoản <strong>ADMIN</strong> được chỉnh sửa.
            </p>

            <form method="post" th:action="@{/admin/settings}" th:object="${systemSettingsRequest}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="row g-3">
                    <div class="col-12 col-md-6">
                        <label class="form-label">Tên đơn vị / trường</label>
                        <input class="form-control" type="text" th:field="*{schoolName}"
                               placeholder="Ví dụ: Trường Đại học ..."/>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('schoolName')}"
                             th:errors="*{schoolName}"></div>
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Tên hiển thị sidebar</label>
                        <input class="form-control" type="text" th:field="*{schoolShortName}"
                               placeholder="Tên ngắn (nếu trống sẽ dùng tên đơn vị)"/>
                        <div class="text-muted small mt-1">Ưu tiên hiển thị trên thanh menu trái.</div>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('schoolShortName')}"
                             th:errors="*{schoolShortName}"></div>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Địa chỉ</label>
                        <textarea class="form-control" rows="2" th:field="*{address}"
                                  placeholder="Địa chỉ trụ sở"></textarea>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('address')}"
                             th:errors="*{address}"></div>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">Điện thoại</label>
                        <input class="form-control" type="text" th:field="*{phone}" placeholder="Hotline"/>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('phone')}"
                             th:errors="*{phone}"></div>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">Email liên hệ</label>
                        <input class="form-control" type="email" th:field="*{contactEmail}" placeholder="email@domain"/>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('contactEmail')}"
                             th:errors="*{contactEmail}"></div>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">Website</label>
                        <input class="form-control" type="text" th:field="*{website}"
                               placeholder="https://..."/>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('website')}"
                             th:errors="*{website}"></div>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Dòng chân trang (footer)</label>
                        <input class="form-control" type="text" th:field="*{footerNote}"
                               placeholder="© 2025 ... — Bản quyền / ghi chú"/>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('footerNote')}"
                             th:errors="*{footerNote}"></div>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button class="btn btn-primary" type="submit">
                        <i class="fa-solid fa-floppy-disk me-1"></i>Lưu cấu hình
                    </button>
                    <a class="btn btn-outline-secondary" th:href="@{/admin}">
                        <i class="fa-solid fa-arrow-left-long me-1"></i>Về dashboard
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
