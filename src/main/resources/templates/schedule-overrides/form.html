<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/dashboard :: layout(
        (${mode}=='edit'?'Chỉnh sửa thay đổi lịch':'Thêm thay đổi lịch'),
        (${mode}=='edit'?'Chỉnh sửa thay đổi lịch':'Thêm thay đổi lịch'),
        'Form dạy bù / đổi phòng',
        'schedule-overrides',
        ~{::content}
      )}">
<body>
<div th:fragment="content">

    <div class="alert alert-danger" th:if="${globalError}" th:text="${globalError}"></div>

    <div class="card">
        <div class="card-body">
            <form method="post"
                  th:action="${mode}=='edit' ? @{/admin/schedule-overrides/{id}(id=${overrideId})} : @{/admin/schedule-overrides}"
                  th:object="${request}">

                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Lịch gốc (bị thay đổi) <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{scheduleId}">
                            <option value="">-- Chọn lịch --</option>
                            <option th:each="s : ${schedules}" th:value="${s.id}"
                                    th:text="${s.semester.code + ' - ' + s.classSection.classCode + ' - ' + (s.timeSlot != null ? s.timeSlot.slotCode : '')}"></option>
                        </select>
                        <small class="text-danger" th:errors="*{scheduleId}"></small>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Ngày buổi gốc (bị thay đổi) <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" th:field="*{overrideDate}">
                        <small class="text-danger" th:errors="*{overrideDate}"></small>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Ngày đích (khi loại «Dịch một buổi»)</label>
                        <input type="date" class="form-control" th:field="*{movedToDate}">
                        <small class="text-muted">Bắt buộc nếu chọn Dịch một buổi; phải khác ngày buổi gốc. Đổi chỉ tiết trong cùng ngày → dùng «Đổi giờ».</small>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Loại thay đổi <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{overrideType}">
                            <option th:each="t : ${overrideTypes}" th:value="${t}" th:text="${t.name() == 'MAKEUP' ? 'Dạy bù' : (t.name() == 'ROOM_CHANGE' ? 'Đổi phòng' : (t.name() == 'TIME_CHANGE' ? 'Đổi giờ' : (t.name() == 'RESCHEDULE' ? 'Dịch một buổi' : 'Hủy buổi')))}"></option>
                        </select>
                        <small class="text-danger" th:errors="*{overrideType}"></small>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Phòng mới (khi đổi phòng)</label>
                        <select class="form-select" th:field="*{newRoomId}">
                            <option value="">-- Không đổi --</option>
                            <option th:each="r : ${rooms}" th:value="${r.roomId}"
                                    th:text="${r.roomCode + ' - ' + r.roomName}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Khung giờ mới (khi đổi giờ)</label>
                        <select class="form-select" th:field="*{newTimeSlotId}">
                            <option value="">-- Không đổi --</option>
                            <option th:each="ts : ${timeSlots}" th:value="${ts.id}"
                                    th:text="${ts.slotCode}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Giảng viên thay thế (dạy bù)</label>
                        <select class="form-select" th:field="*{newLecturerId}">
                            <option value="">-- Không đổi --</option>
                            <option th:each="lec : ${lecturers}" th:value="${lec.lecturerId}"
                                    th:text="${lec.lecturerCode + ' - ' + lec.fullName}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Trạng thái</label>
                        <select class="form-select" th:field="*{status}">
                            <option th:each="st : ${overrideStatuses}" th:value="${st}" th:text="${st.name() == 'ACTIVE' ? 'Áp dụng' : 'Đã hủy'}"></option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Lý do thay đổi</label>
                        <input type="text" class="form-control" th:field="*{reason}" placeholder="Tối đa 255 ký tự" maxlength="255">
                        <small class="text-danger" th:errors="*{reason}"></small>
                    </div>
                </div>

                <hr>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-save"></i>
                        <span th:text="${mode}=='edit' ? 'Cập nhật' : 'Thêm mới'"></span>
                    </button>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/schedule-overrides}">
                        <i class="fa-solid fa-arrow-left"></i> Quay lại
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
