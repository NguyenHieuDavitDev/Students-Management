<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/dashboard :: layout(
        'Dạy bù / Đổi phòng',
        'Danh sách thay đổi lịch',
        'Quản lý thay đổi lịch (dạy bù, đổi phòng, đổi giờ, hủy buổi)',
        'schedule-overrides',
        ~{::content}
      )}">
<body>
<div th:fragment="content">

    <div th:if="${success}" class="alert alert-success">
        <i class="fa-solid fa-circle-check me-1"></i>
        <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger">
        <i class="fa-solid fa-triangle-exclamation me-1"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card">
        <div class="card-body">

            <div class="d-flex justify-content-between mb-3 flex-wrap gap-2">
                <form class="d-flex gap-2" method="get" th:action="@{/admin/schedule-overrides}">
                    <input class="form-control"
                           name="keyword"
                           placeholder="Tìm theo lý do, học kỳ, lớp, GV, phòng..."
                           th:value="${keyword}"
                           style="min-width: 260px;">
                    <button class="btn btn-outline-primary">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        Tìm
                    </button>
                </form>
                <div class="d-flex gap-2 flex-wrap">
                    <form class="d-flex gap-2" th:action="@{/admin/schedule-overrides/import}" method="post" enctype="multipart/form-data">
                        <input type="file" name="file" class="form-control form-control-sm" accept=".xlsx,.xls" required>
                        <button class="btn btn-outline-success btn-sm" type="submit">
                            <i class="fa-solid fa-file-import"></i> Import
                        </button>
                    </form>
                    <a class="btn btn-outline-success" th:href="@{/admin/schedule-overrides/export}">
                        <i class="fa-solid fa-file-excel"></i> Export
                    </a>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/schedule-overrides/print}" target="_blank">
                        <i class="fa-solid fa-print"></i> In
                    </a>
                    <a class="btn btn-primary" th:href="@{/admin/schedule-overrides/new}">
                        <i class="fa-solid fa-plus"></i> Thêm mới
                    </a>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle table-sm">
                    <thead>
                    <tr>
                        <th>Lịch gốc</th>
                        <th>Ngày buổi gốc</th>
                        <th>Ngày đích</th>
                        <th>Loại</th>
                        <th>Phòng mới</th>
                        <th>Khung giờ mới</th>
                        <th>GV thay thế</th>
                        <th>Trạng thái</th>
                        <th>Lý do</th>
                        <th class="text-end">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="o : ${overrides.content}">
                        <td th:text="${o.scheduleBrief}" style="max-width:180px;"></td>
                        <td th:text="${#temporals.format(o.overrideDate, 'dd/MM/yyyy')}"></td>
                        <td th:text="${o.movedToDate != null ? #temporals.format(o.movedToDate, 'dd/MM/yyyy') : '—'}"></td>
                        <td>
                            <span th:if="${o.overrideType?.name() == 'MAKEUP'}" class="badge bg-info">Dạy bù</span>
                            <span th:if="${o.overrideType?.name() == 'ROOM_CHANGE'}" class="badge bg-primary">Đổi phòng</span>
                            <span th:if="${o.overrideType?.name() == 'TIME_CHANGE'}" class="badge bg-warning">Đổi giờ</span>
                            <span th:if="${o.overrideType?.name() == 'RESCHEDULE'}" class="badge bg-success">Dịch buổi</span>
                            <span th:if="${o.overrideType?.name() == 'CANCEL'}" class="badge bg-secondary">Hủy buổi</span>
                        </td>
                        <td th:text="${o.newRoomDisplay} ?: '-'"></td>
                        <td th:text="${o.newTimeSlotDisplay} ?: '-'"></td>
                        <td th:text="${o.newLecturerName} ?: '-'"></td>
                        <td>
                            <span th:if="${o.status?.name() == 'ACTIVE'}" class="badge bg-success">Áp dụng</span>
                            <span th:if="${o.status?.name() == 'CANCELLED'}" class="badge bg-secondary">Đã hủy</span>
                        </td>
                        <td th:text="${o.reason}" style="max-width:160px;" th:title="${o.reason}"></td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/schedule-overrides/{id}/edit(id=${o.overrideId})}">
                                <i class="fa-solid fa-pen-to-square"></i> Sửa
                            </a>
                            <form method="post" th:action="@{/admin/schedule-overrides/{id}/delete(id=${o.overrideId})}" style="display:inline;"
                                  onsubmit="return confirm('Bạn có chắc muốn xóa bản ghi này?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-trash"></i> Xóa</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${overrides.content.isEmpty()}">
                        <td colspan="10" class="text-center text-muted">
                            <i class="fa-solid fa-box-open"></i> Không có dữ liệu thay đổi lịch
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${overrides.totalPages > 1}" class="mt-3">
                <ul class="pagination justify-content-center mb-0">
                    <li class="page-item" th:classappend="${overrides.first} ? 'disabled' : ''">
                        <a class="page-link" th:href="@{/admin/schedule-overrides(page=${overrides.number - 1}, keyword=${keyword})}">Trước</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, overrides.totalPages - 1)}" th:classappend="${i == overrides.number} ? 'active' : ''">
                        <a class="page-link" th:text="${i + 1}" th:href="@{/admin/schedule-overrides(page=${i}, keyword=${keyword})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${overrides.last} ? 'disabled' : ''">
                        <a class="page-link" th:href="@{/admin/schedule-overrides(page=${overrides.number + 1}, keyword=${keyword})}">Sau</a>
                    </li>
                </ul>
            </nav>

        </div>
    </div>

</div>
</body>
</html>
