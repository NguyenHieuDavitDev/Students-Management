<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>In danh sách thay đổi lịch (Dạy bù / Đổi phòng)</title>
    <style>
        @page { size: A4 landscape; margin: 15mm; }
        body { font-family: "Segoe UI", Arial; font-size: 12px; }
        .header { text-align: center; margin-bottom: 12px; }
        .header h2 { margin: 0; font-size: 18px; text-transform: uppercase; }
        .header .sub { font-size: 11px; margin-top: 4px; }
        .info { margin-bottom: 8px; font-size: 11px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #000; padding: 4px 6px; }
        th { background: #f2f2f2; text-align: center; font-weight: 600; font-size: 11px; }
        td { vertical-align: middle; }
        .text-center { text-align: center; }
        .footer { margin-top: 16px; text-align: right; font-size: 11px; }
    </style>
</head>
<body onload="window.print()">

<div class="header">
    <h2>DANH SÁCH THAY ĐỔI LỊCH (DẠY BÙ / ĐỔI PHÒNG)</h2>
    <div class="sub">Ngày in: <span th:text="${#dates.format(#dates.createNow(), 'dd/MM/yyyy')}"></span></div>
</div>

<div class="info">Tổng số: <strong th:text="${overrides.size()}"></strong></div>

<table>
    <thead>
    <tr>
        <th style="width:28px">STT</th>
        <th>Lịch gốc</th>
        <th style="width:85px">Ngày áp dụng</th>
        <th style="width:75px">Loại</th>
        <th style="width:90px">Phòng mới</th>
        <th style="width:70px">Khung giờ mới</th>
        <th>GV thay thế</th>
        <th style="width:65px">Trạng thái</th>
        <th>Lý do</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="o, i : ${overrides}">
        <td class="text-center" th:text="${i.index + 1}"></td>
        <td th:text="${o.scheduleBrief}"></td>
        <td th:text="${#temporals.format(o.overrideDate(), 'dd/MM/yyyy')}"></td>
        <td class="text-center" th:text="${o.overrideType?.name() == 'MAKEUP' ? 'Dạy bù' : (o.overrideType?.name() == 'ROOM_CHANGE' ? 'Đổi phòng' : (o.overrideType?.name() == 'TIME_CHANGE' ? 'Đổi giờ' : (o.overrideType?.name() == 'RESCHEDULE' ? 'Dịch buổi' : 'Hủy buổi')))}"></td>
        <td th:text="${o.newRoomDisplay} ?: '-'"></td>
        <td th:text="${o.newTimeSlotDisplay} ?: '-'"></td>
        <td th:text="${o.newLecturerName} ?: '-'"></td>
        <td class="text-center" th:text="${o.status?.name() == 'ACTIVE' ? 'Áp dụng' : 'Đã hủy'}"></td>
        <td th:text="${o.reason}"></td>
    </tr>
    <tr th:if="${overrides.isEmpty()}">
        <td colspan="9" class="text-center">Không có dữ liệu thay đổi lịch</td>
    </tr>
    </tbody>
</table>

<div class="footer">
    <p><strong>Người lập</strong></p>
    <p style="margin-top:30px;">(Ký, ghi rõ họ tên)</p>
</div>

</body>
</html>
